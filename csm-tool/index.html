<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ecoplanet — CSM Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #F5F6FA; margin: 0; min-height: 100vh; }
    .drop-active { border-color: #1A2FEE !important; background: #EEF0FF !important; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.22s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tooltip-wrap { position: relative; display: inline-flex; align-items: center; }
    .tooltip-box {
      display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%); background: #1e293b; color: #fff;
      font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: 8px;
      white-space: nowrap; pointer-events: none; z-index: 50;
    }
    .tooltip-wrap:hover .tooltip-box { display: block; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ── Google Apps Script Web App URL ── */
/* Replace with your deployed Apps Script URL after setup */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEVf4FuOIH8yZsGPwz-76tlazapfAFSRTVcIwI47_M3wBa78UiAQIgtt9rWZxn4ZrmCg/exec';

/* Strip legal suffixes to build short company name */
const shortName = (name) =>
  name.replace(/\s*(GmbH\s*&\s*Co\.?\s*KG|GmbH\s*&\s*Co\.|GmbH|AG|SE|KG|OHG|UG\s*\(haftungsbeschränkt\)|UG|e\.K\.|eK)\s*/gi, '').replace(/\s+/g, ' ').trim();

const C = {
  blue:     '#1A2FEE',
  darkblue: '#00095B',
  lblue:    '#7582F6',
  yellow:   '#E2EC2B',
  lgray:    '#AEAEAE',
  dgray:    '#737373',
  bg:       '#F5F6FA',
};

/* ── Real ecoplanet logo ── */
const Logo = () => (
  <div className="flex items-center gap-3">
    <img src="logo.svg" alt="ecoplanet" style={{ height: '28px' }} onError={e => { e.target.style.display='none'; }}/>
    <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{ background: '#EEF0FF', color: C.blue }}>
      CSM Portal
    </span>
  </div>
);

/* ── Step indicator ── */
const Steps = ({ current }) => {
  const steps = ['Kunde', 'Lastgänge', 'Übersicht'];
  return (
    <div className="flex items-center">
      {steps.map((s, i) => {
        const idx = i + 1;
        const done = idx < current;
        const active = idx === current;
        return (
          <React.Fragment key={s}>
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all"
                style={{ background: done ? C.yellow : active ? C.blue : '#E5E7EB', color: done ? C.darkblue : active ? '#fff' : C.lgray }}>
                {done ? '✓' : idx}
              </div>
              <span className="text-sm font-medium" style={{ color: active ? C.darkblue : C.lgray }}>{s}</span>
            </div>
            {i < steps.length - 1 && <div className="w-10 h-px mx-2" style={{ background: done ? C.blue : '#E5E7EB' }}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
};

/* ── Text input field ── */
const Field = ({ label, value, onChange, placeholder, inputRef }) => (
  <div>
    <label className="block text-xs font-semibold mb-1.5 uppercase tracking-wide" style={{ color: C.dgray }}>
      {label}
    </label>
    <input
      ref={inputRef}
      type="text"
      value={value}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      className="w-full px-4 py-3 rounded-xl border-2 text-sm font-medium outline-none transition-all"
      style={{ borderColor: value.length > 0 ? C.blue : '#E5E7EB', color: C.darkblue, background: '#fff' }}
    />
  </div>
);

/* ── Single-select pill group ── */
const SelectGroup = ({ label, options, value, onChange, disabled = false, tooltip }) => (
  <div>
    <div className="flex items-center gap-1.5 mb-1.5">
      <label className="text-xs font-semibold uppercase tracking-wide" style={{ color: disabled ? C.lgray : C.dgray }}>
        {label}
      </label>
      {tooltip && (
        <div className="tooltip-wrap">
          <div style={{ width:15, height:15, borderRadius:'50%', background:'#E5E7EB', display:'flex', alignItems:'center', justifyContent:'center', cursor:'default' }}>
            <span style={{ fontSize:10, fontWeight:700, color:C.dgray }}>i</span>
          </div>
          <div className="tooltip-box">{tooltip}</div>
        </div>
      )}
    </div>
    <div className="flex gap-2 flex-wrap">
      {options.map(opt => {
        const active = value === opt.value;
        return (
          <button key={opt.value} disabled={disabled} onClick={() => !disabled && onChange(opt.value)}
            className="px-4 py-2 rounded-xl text-sm font-semibold border-2 transition-all"
            style={{
              borderColor: disabled ? '#E5E7EB' : active ? C.blue : '#E5E7EB',
              background: disabled ? '#F9FAFB' : active ? C.blue : '#fff',
              color: disabled ? C.lgray : active ? '#fff' : C.darkblue,
              cursor: disabled ? 'not-allowed' : 'pointer',
              opacity: disabled ? 0.5 : 1,
            }}>
            {opt.label}
          </button>
        );
      })}
    </div>
  </div>
);

/* ── Multi-select pill group ── */
const MultiSelectGroup = ({ label, options, value, onChange }) => {
  const toggle = (v) => {
    if (value.includes(v)) {
      if (value.length > 1) onChange(value.filter(x => x !== v));
    } else {
      onChange([...value, v]);
    }
  };
  return (
    <div>
      <label className="block text-xs font-semibold mb-1.5 uppercase tracking-wide" style={{ color: C.dgray }}>
        {label} <span className="normal-case font-normal ml-1" style={{ color: C.lgray }}>(Mehrfachauswahl)</span>
      </label>
      <div className="flex gap-2 flex-wrap">
        {options.map(opt => {
          const active = value.includes(opt.value);
          return (
            <button key={opt.value} onClick={() => toggle(opt.value)}
              className="px-4 py-2 rounded-xl text-sm font-semibold border-2 transition-all"
              style={{
                borderColor: active ? C.blue : '#E5E7EB',
                background: active ? C.blue : '#fff',
                color: active ? '#fff' : C.darkblue,
              }}>
              {opt.label}
            </button>
          );
        })}
      </div>
    </div>
  );
};

/* ── Number input ── */
const NumberField = ({ label, value, onChange, min = 1, max = 20 }) => {
  const [raw, setRaw] = React.useState(String(value));
  React.useEffect(() => { setRaw(String(value)); }, [value]);
  return (
    <div>
      <label className="block text-xs font-semibold mb-1.5 uppercase tracking-wide" style={{ color: C.dgray }}>{label}</label>
      <input
        type="number" min={min} max={max} value={raw}
        onChange={e => {
          setRaw(e.target.value);
          const n = parseInt(e.target.value);
          if (!isNaN(n)) onChange(Math.max(min, Math.min(max, n)));
        }}
        onBlur={() => {
          const n = parseInt(raw);
          const clamped = isNaN(n) ? min : Math.max(min, Math.min(max, n));
          setRaw(String(clamped));
          onChange(clamped);
        }}
        className="w-full px-4 py-3 rounded-xl border-2 text-sm font-medium outline-none transition-all"
        style={{ borderColor: C.blue, color: C.darkblue, background: '#fff' }}
      />
    </div>
  );
};

/* ── File row ── */
const FileRow = ({ file, onRemove, ext }) => (
  <div className="fade-in flex items-center justify-between px-3 py-2.5 rounded-xl border" style={{ background:'#fff', borderColor:'#E5E7EB' }}>
    <div className="flex items-center gap-2.5">
      <div className="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background:'#EEF0FF' }}>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M3 2h7l3 3v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke={C.blue} strokeWidth="1.3" fill="none"/>
          <path d="M10 2v3h3" stroke={C.blue} strokeWidth="1.3"/>
          <line x1="5" y1="8" x2="11" y2="8" stroke={C.blue} strokeWidth="1.2" strokeLinecap="round"/>
          <line x1="5" y1="11" x2="9" y2="11" stroke={C.blue} strokeWidth="1.2" strokeLinecap="round"/>
        </svg>
      </div>
      <div>
        <div className="text-sm font-medium leading-tight truncate" style={{ color: C.darkblue, maxWidth:'320px' }}>{file.name}</div>
        <div className="text-xs mt-0.5" style={{ color: C.dgray }}>{(file.size/1024).toFixed(0)} KB · {ext || 'CSV'}</div>
      </div>
    </div>
    <button onClick={onRemove} className="w-6 h-6 rounded-lg flex items-center justify-center flex-shrink-0 hover:bg-red-50" style={{ color: C.lgray }}>
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none">
        <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
      </svg>
    </button>
  </div>
);

/* ── Reusable drop zone ── */
const DropZone = ({ title, hint, accept, multiple, files, onAdd, onRemove, required }) => {
  const [dragging, setDragging] = useState(false);
  const [error, setError]       = useState('');
  const inputRef = useRef(null);

  const exts = accept.split(',').map(s => s.trim());
  const extLabel = exts.join(' / ').toUpperCase();

  const processFiles = (incoming) => {
    const valid = Array.from(incoming).filter(f => {
      const name = f.name.toLowerCase();
      return exts.some(ext => name.endsWith(ext));
    });
    const invalid = Array.from(incoming).length - valid.length;
    setError(invalid > 0 ? `${invalid} Datei(en) ignoriert — nur ${extLabel} erlaubt.` : '');
    if (!valid.length) return;
    const toAdd = multiple ? valid : [valid[0]];
    onAdd(toAdd);
  };

  return (
    <div className="flex flex-col gap-2">
      <div className="flex items-center gap-2">
        <span className="text-sm font-bold" style={{ color: C.darkblue }}>{title}</span>
        {required && <span className="text-xs px-1.5 py-0.5 rounded font-semibold" style={{ background:'#FEE2E2', color:'#DC2626' }}>Pflicht</span>}
      </div>
      {hint && <p className="text-xs" style={{ color: C.dgray }}>{hint}</p>}

      <div
        onDrop={e => { e.preventDefault(); setDragging(false); processFiles(e.dataTransfer.files); }}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onClick={() => inputRef.current?.click()}
        className="rounded-xl border-2 border-dashed px-6 py-5 flex items-center gap-4 cursor-pointer transition-all"
        style={{ borderColor: dragging ? C.blue : files.length > 0 ? '#A5B4FC' : '#E5E7EB', background: dragging ? '#EEF0FF' : files.length > 0 ? '#F8F9FF' : '#FAFAFA' }}>
        <input ref={inputRef} type="file" accept={accept} multiple={multiple} className="hidden"
          onChange={e => processFiles(e.target.files)}/>
        <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 transition-all"
          style={{ background: dragging ? C.blue : '#EEF0FF' }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 15V3M12 3l-4 4M12 3l4 4" stroke={dragging ? '#fff' : C.blue} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M3 15v4a2 2 0 002 2h14a2 2 0 002-2v-4" stroke={dragging ? '#fff' : C.blue} strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </div>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-semibold" style={{ color: dragging ? C.blue : C.darkblue }}>
            {dragging ? 'Loslassen …' : files.length > 0 ? `${files.length} Datei${files.length > 1 ? 'en' : ''} hochgeladen` : 'Dateien hier ablegen oder klicken'}
          </p>
          <p className="text-xs mt-0.5" style={{ color: C.lgray }}>{extLabel} · {multiple ? 'Mehrere möglich' : 'Eine Datei'}</p>
        </div>
        {files.length > 0 && (
          <div className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0"
            style={{ background: '#D1FAE5' }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#065F46" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        )}
      </div>

      {error && (
        <p className="text-xs" style={{ color:'#DC2626' }}>{error}</p>
      )}

      {files.length > 0 && (
        <div className="flex flex-col gap-1.5">
          {files.map(f => (
            <FileRow key={f.name} file={f} ext={exts[0].replace('.','').toUpperCase()}
              onRemove={() => onRemove(f.name)}/>
          ))}
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
const App = () => {
  const [step, setStep]             = useState(1);
  const [company, setCompany]       = useState('');
  const [adresse, setAdresse]       = useState('');
  const [lieferjahre, setLieferjahre] = useState(['2027']);
  const [energietraeger, setEnergietraeger] = useState('Strom');
  const [bonitaet, setBonitaet]     = useState('unbekannt');
  const [gruenstrom, setGruenstrom] = useState('Nein');
  const [ppa, setPpa]               = useState('Nein');
  const [pvStatus, setPvStatus]     = useState('nicht vorhanden');
  const [pvAnzahl, setPvAnzahl]     = useState(1);
  const [pvLastgaenge, setPvLastgaenge] = useState('Nein');
  const [pvAnlagen, setPvAnlagen]   = useState([{ leistung:'', standort:'' }]);

  const [verbrauchsFiles, setVerbrauchsFiles] = useState([]);
  const [lieferstelleFiles, setLieferstelleFiles] = useState([]);
  const [erzeugerFiles, setErzeugerFiles]     = useState([]);

  const [sheetUrl, setSheetUrl]       = useState('');
  const [sheetLoading, setSheetLoading] = useState(false);
  const [sheetError, setSheetError]   = useState('');

  const companyRef = useRef(null);

  /* focus company field only on first render */
  useEffect(() => { companyRef.current?.focus(); }, []);

  const isGas      = energietraeger === 'Gas';
  const isPvVorhanden = pvStatus === 'vorhanden';
  const ppaDisabled = bonitaet === 'schlecht';

  /* sync PV-Anlagen array when count changes */
  const updatePvAnzahl = (n) => {
    setPvAnzahl(n);
    setPvAnlagen(prev => {
      const next = [...prev];
      while (next.length < n) next.push({ leistung:'', standort:'' });
      return next.slice(0, n);
    });
  };

  const updatePvAnlage = (idx, field, val) => {
    setPvAnlagen(prev => prev.map((a, i) => i === idx ? { ...a, [field]: val } : a));
  };

  const canStep1 = company.trim().length >= 2 && adresse.trim().length >= 2;
  const canStep2 = verbrauchsFiles.length > 0 && lieferstelleFiles.length > 0;

  /* ── Step 1 ── */
  const Step1 = () => (
    <div className="flex flex-col gap-5 max-w-lg mx-auto">
      <div>
        <h2 className="text-2xl font-bold mb-1" style={{ color: C.darkblue }}>Kunde anlegen</h2>
        <p className="text-sm" style={{ color: C.dgray }}>Kundendaten und Beschaffungsparameter eintragen.</p>
      </div>

      {/* Company + address */}
      <Field label="Firmenname" value={company} onChange={setCompany} placeholder="z.B. NORMA Group SE" inputRef={companyRef}/>
      <Field label="Adresse" value={adresse} onChange={setAdresse} placeholder="z.B. Ingolstädter Str. 1, 90451 Nürnberg" inputRef={undefined}/>

      <div className="border-t" style={{ borderColor: '#F0F0F0' }}/>

      {/* Lieferjahr — multiselect */}
      <MultiSelectGroup
        label="Lieferjahr"
        value={lieferjahre}
        onChange={setLieferjahre}
        options={[{ value:'2027', label:'2027' }, { value:'2028', label:'2028' }, { value:'2029', label:'2029' }]}
      />

      {/* Energieträger */}
      <SelectGroup
        label="Energieträger"
        value={energietraeger}
        onChange={v => { setEnergietraeger(v); if (v === 'Gas') { setGruenstrom('Nein'); setPpa('Nein'); } }}
        options={[{ value:'Strom', label:'⚡ Strom' }, { value:'Gas', label:'🔥 Gas' }]}
      />

      {/* Bonität — above Grünstrom */}
      <SelectGroup
        label="Bonität"
        value={bonitaet}
        onChange={v => { setBonitaet(v); if (v === 'schlecht') setPpa('Nein'); }}
        tooltip="Bitte North Data checken"
        options={[
          { value:'gut',       label:'Gut' },
          { value:'schlecht',  label:'Schlecht' },
          { value:'unbekannt', label:'Unbekannt' },
        ]}
      />

      {/* Grünstrom */}
      <div>
        <SelectGroup
          label="Grünstrom"
          value={gruenstrom}
          onChange={setGruenstrom}
          disabled={isGas}
          options={[{ value:'Ja', label:'Ja' }, { value:'Nein', label:'Nein' }]}
        />
        {isGas && <p className="text-xs mt-1.5" style={{ color: C.lgray }}>Nicht verfügbar bei Energieträger Gas.</p>}
      </div>

      {/* PPA — greyed out (not hidden) when Bonität = schlecht or Gas */}
      {!isGas && (
        <div>
          <SelectGroup
            label="PPA"
            value={ppa}
            onChange={setPpa}
            disabled={ppaDisabled}
            options={[{ value:'Ja', label:'Ja' }, { value:'Nein', label:'Nein' }]}
          />
          {ppaDisabled && (
            <p className="text-xs mt-1.5" style={{ color: C.lgray }}>Nicht verfügbar — Bonität des Kunden ist schlecht.</p>
          )}
        </div>
      )}

      {!isGas && <div className="border-t" style={{ borderColor: '#F0F0F0' }}/>}

      {/* PV-Eigenerzeugung — hidden when Gas */}
      {!isGas && (
        <SelectGroup
          label="PV-Eigenerzeugung"
          value={pvStatus}
          onChange={v => { setPvStatus(v); if (v === 'nicht vorhanden') { setPvAnzahl(1); setPvAnlagen([{ leistung:'', standort:'' }]); } }}
          options={[{ value:'vorhanden', label:'Vorhanden' }, { value:'nicht vorhanden', label:'Nicht vorhanden' }]}
        />
      )}

      {!isGas && isPvVorhanden && (
        <div className="fade-in flex flex-col gap-4 pl-4 border-l-2" style={{ borderColor: C.lblue }}>
          {/* Anzahl + Lastgänge side by side */}
          <div className="grid grid-cols-2 gap-4">
            <NumberField label="Anzahl PV-Anlagen" value={pvAnzahl} onChange={updatePvAnzahl} min={1} max={20}/>
            <SelectGroup
              label="Lastgänge vorhanden"
              value={pvLastgaenge}
              onChange={setPvLastgaenge}
              options={[{ value:'Ja', label:'Ja' }, { value:'Nein', label:'Nein' }]}
            />
          </div>

          {/* Per-PV-plant fields */}
          <div className="flex flex-col gap-3">
            <div className="text-xs font-semibold uppercase tracking-wide" style={{ color: C.dgray }}>
              Anlagen-Details
            </div>
            {pvAnlagen.map((anlage, idx) => (
              <div key={idx} className="fade-in rounded-xl p-4 border" style={{ background:'#FAFAFA', borderColor:'#E5E7EB' }}>
                <div className="text-xs font-bold mb-3" style={{ color: C.blue }}>Anlage {idx + 1}</div>
                <div className="flex flex-col gap-3">
                  <div>
                    <label className="block text-xs font-semibold mb-1.5 uppercase tracking-wide" style={{ color: C.dgray }}>Leistung (kWp)</label>
                    <input
                      type="number" min="0" value={anlage.leistung}
                      onChange={e => updatePvAnlage(idx, 'leistung', e.target.value)}
                      placeholder="z.B. 250"
                      className="w-full px-3 py-2.5 rounded-xl border-2 text-sm font-medium outline-none transition-all"
                      style={{ borderColor: anlage.leistung ? C.blue : '#E5E7EB', color: C.darkblue, background:'#fff' }}
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold mb-1.5 uppercase tracking-wide" style={{ color: C.dgray }}>Standort (Adresse)</label>
                    <input
                      type="text" value={anlage.standort}
                      onChange={e => updatePvAnlage(idx, 'standort', e.target.value)}
                      placeholder="z.B. Musterstraße 1, 80335 München"
                      className="w-full px-3 py-2.5 rounded-xl border-2 text-sm font-medium outline-none transition-all"
                      style={{ borderColor: anlage.standort ? C.blue : '#E5E7EB', color: C.darkblue, background:'#fff' }}
                    />
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <button onClick={() => setStep(2)} disabled={!canStep1}
        className="flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-sm transition-all active:scale-95 mt-1"
        style={{ background: canStep1 ? C.blue : '#E5E7EB', color: canStep1 ? '#fff' : C.lgray, cursor: canStep1 ? 'pointer' : 'not-allowed' }}>
        Weiter
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
    </div>
  );

  /* ── Step 2: File upload ── */
  const Step2 = () => (
    <div className="flex flex-col gap-7 max-w-2xl mx-auto w-full">
      <div>
        <div className="flex items-center gap-2 mb-1">
          <h2 className="text-2xl font-bold" style={{ color: C.darkblue }}>Lastgänge hochladen</h2>
          <span className="text-sm px-3 py-1 rounded-full font-semibold" style={{ background:'#EEF0FF', color: C.blue }}>{company}</span>
        </div>
        <p className="text-sm" style={{ color: C.dgray }}>Bitte lade alle erforderlichen Dateien hoch.</p>
      </div>

      {/* 1 — Verbrauchslastgänge */}
      <DropZone
        title="Verbrauchslastgänge"
        hint="Diese können aus dem Cockpit heruntergeladen werden."
        accept=".csv"
        multiple={true}
        required={true}
        files={verbrauchsFiles}
        onAdd={incoming => setVerbrauchsFiles(prev => {
          const names = new Set(prev.map(f => f.name));
          return [...prev, ...incoming.filter(f => !names.has(f.name))];
        })}
        onRemove={name => setVerbrauchsFiles(prev => prev.filter(f => f.name !== name))}
      />

      <div className="border-t" style={{ borderColor:'#F0F0F0' }}/>

      {/* 2 — Lieferstellenübersicht */}
      <DropZone
        title="Lieferstellenübersicht"
        hint="Soll alle Lieferstellen (RLM und SLP) inkludieren, welche in den Vertrag aufgenommen werden sollen."
        accept=".xlsx,.xls"
        multiple={false}
        required={true}
        files={lieferstelleFiles}
        onAdd={incoming => setLieferstelleFiles([incoming[0]])}
        onRemove={() => setLieferstelleFiles([])}
      />

      {/* 3 — Eigenerzeugungslastgänge (nur wenn pvLastgaenge = Ja) */}
      {!isGas && isPvVorhanden && pvLastgaenge === 'Ja' && (<>
        <div className="border-t" style={{ borderColor:'#F0F0F0' }}/>
        <DropZone
          title="Eigenerzeugungslastgänge"
          hint={`Lastgänge der ${pvAnzahl} PV-Anlage${pvAnzahl > 1 ? 'n' : ''} — eine Datei pro Anlage empfohlen.`}
          accept=".csv"
          multiple={true}
          required={false}
          files={erzeugerFiles}
          onAdd={incoming => setErzeugerFiles(prev => {
            const names = new Set(prev.map(f => f.name));
            return [...prev, ...incoming.filter(f => !names.has(f.name))];
          })}
          onRemove={name => setErzeugerFiles(prev => prev.filter(f => f.name !== name))}
        />
      </>)}

      <div className="flex items-center gap-3 pt-1">
        <button onClick={() => setStep(1)} className="px-5 py-2.5 rounded-xl text-sm font-semibold border"
          style={{ borderColor:'#E5E7EB', color: C.dgray, background:'#fff' }}>← Zurück</button>
        <button onClick={() => setStep(3)} disabled={!canStep2}
          className="flex items-center gap-2 px-6 py-2.5 rounded-xl font-bold text-sm transition-all active:scale-95"
          style={{ background: canStep2 ? C.blue : '#E5E7EB', color: canStep2 ? '#fff' : C.lgray, cursor: canStep2 ? 'pointer' : 'not-allowed' }}>
          Weiter
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  );

  /* ── Step 3: Summary ── */
  const Step3 = () => {
    const allFiles = [...verbrauchsFiles, ...lieferstelleFiles, ...erzeugerFiles];
    const totalKb = allFiles.reduce((a, f) => a + f.size, 0) / 1024;
    const tags = [
      lieferjahre.join(', '),
      energietraeger,
      !isGas && `Grünstrom: ${gruenstrom}`,
      !isGas && !ppaDisabled && `PPA: ${ppa}`,
      `Bonität: ${bonitaet.charAt(0).toUpperCase() + bonitaet.slice(1)}`,
      isPvVorhanden && `PV: ${pvAnzahl} Anlage${pvAnzahl > 1 ? 'n' : ''}`,
    ].filter(Boolean);

    return (
      <div className="flex flex-col gap-6 max-w-lg mx-auto w-full">
        <div>
          <h2 className="text-2xl font-bold mb-1" style={{ color: C.darkblue }}>Übersicht</h2>
          <p className="text-sm" style={{ color: C.dgray }}>Bitte prüfe alle Angaben vor dem Abschluss.</p>
        </div>

        <div className="rounded-2xl border p-5 flex flex-col gap-4" style={{ borderColor:'#E5E7EB', background:'#fff' }}>
          {/* Customer block */}
          <div className="flex items-start justify-between pb-4 border-b" style={{ borderColor:'#F3F4F6' }}>
            <div className="flex flex-col gap-1.5 flex-1">
              <div className="text-xs font-semibold uppercase tracking-wide" style={{ color: C.dgray }}>Kunde</div>
              <div className="text-lg font-bold leading-tight" style={{ color: C.darkblue }}>{company}</div>
              <div className="text-xs" style={{ color: C.dgray }}>{adresse}</div>
              <div className="flex flex-wrap gap-1.5 mt-1">
                {tags.map(t => (
                  <span key={t} className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{ background:'#EEF0FF', color: C.blue }}>{t}</span>
                ))}
              </div>
            </div>
            <button onClick={() => setStep(1)} className="text-xs font-medium px-3 py-1 rounded-lg border flex-shrink-0 ml-4"
              style={{ borderColor:'#E5E7EB', color: C.blue }}>Ändern</button>
          </div>

          {/* PV details */}
          {isPvVorhanden && (
            <div className="pb-4 border-b" style={{ borderColor:'#F3F4F6' }}>
              <div className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: C.dgray }}>PV-Anlagen</div>
              <div className="flex flex-col gap-1.5">
                {pvAnlagen.map((a, i) => (
                  <div key={i} className="flex items-center justify-between text-sm">
                    <span style={{ color: C.darkblue }}>Anlage {i+1}{a.standort ? ` — ${a.standort}` : ''}</span>
                    <span style={{ color: C.dgray }}>{a.leistung ? `${a.leistung} kWp` : '—'}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Files */}
          <div className="flex flex-col gap-3">
            <div className="flex items-center justify-between">
              <div className="text-xs font-semibold uppercase tracking-wide" style={{ color: C.dgray }}>Dateien</div>
              <div className="text-xs" style={{ color: C.dgray }}>{totalKb.toFixed(0)} KB gesamt</div>
            </div>
            {[
              { label:'Verbrauchslastgänge', list: verbrauchsFiles },
              { label:'Lieferstellenübersicht', list: lieferstelleFiles },
              ...(erzeugerFiles.length > 0 ? [{ label:'Eigenerzeugung', list: erzeugerFiles }] : []),
            ].map(({ label, list }) => list.length > 0 && (
              <div key={label}>
                <div className="text-xs font-semibold mb-1" style={{ color: C.dgray }}>{label}</div>
                {list.map(f => (
                  <div key={f.name} className="flex items-center justify-between text-sm py-0.5">
                    <span className="truncate" style={{ color: C.darkblue, maxWidth:'280px' }}>{f.name}</span>
                    <span className="flex-shrink-0 ml-2" style={{ color: C.dgray }}>{(f.size/1024).toFixed(0)} KB</span>
                  </div>
                ))}
              </div>
            ))}
            <button onClick={() => setStep(2)} className="text-xs font-medium" style={{ color: C.blue }}>
              + Dateien anpassen
            </button>
          </div>
        </div>

        {/* Google Sheet link */}
        {sheetUrl && (
          <div className="fade-in rounded-2xl border p-5 flex items-start gap-4"
            style={{ borderColor:'#D1FAE5', background:'#F0FDF4' }}>
            <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
              style={{ background:'#065F46' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="18" height="18" rx="3" stroke="#fff" strokeWidth="1.8"/>
                <path d="M8 12l3 3 5-5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-sm font-bold mb-0.5" style={{ color:'#065F46' }}>Google Sheet erstellt</div>
              <div className="text-xs mb-2.5" style={{ color:'#047857' }}>
                {(() => {
                  const d = new Date();
                  const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
                  return `${ds}_${shortName(company)}_${lieferjahre[0]}`;
                })()}
              </div>
              <a href={sheetUrl} target="_blank" rel="noopener noreferrer"
                className="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-lg transition-all"
                style={{ background:'#065F46', color:'#fff' }}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                Sheet öffnen
              </a>
            </div>
          </div>
        )}

        {sheetError && (
          <div className="rounded-xl border p-4 text-sm" style={{ borderColor:'#FCA5A5', background:'#FEF2F2', color:'#DC2626' }}>
            {sheetError}
          </div>
        )}

        <button
          onClick={async () => {
            setSheetLoading(true);
            setSheetError('');
            try {
              if (APPS_SCRIPT_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
                throw new Error('Apps Script URL noch nicht eingetragen.');
              }
              const data = await new Promise((resolve, reject) => {
                const cbName = 'gsc_' + Date.now();
                const script = document.createElement('script');
                const qs = new URLSearchParams({ company, lieferjahr: lieferjahre[0], callback: cbName });
                const timer = setTimeout(() => {
                  delete window[cbName];
                  document.head.removeChild(script);
                  reject(new Error('Timeout — Apps Script hat nicht geantwortet.'));
                }, 30000);
                window[cbName] = (result) => {
                  clearTimeout(timer);
                  delete window[cbName];
                  document.head.removeChild(script);
                  resolve(result);
                };
                script.onerror = () => {
                  clearTimeout(timer);
                  delete window[cbName];
                  document.head.removeChild(script);
                  reject(new Error('Script konnte nicht geladen werden.'));
                };
                script.src = APPS_SCRIPT_URL + '?' + qs;
                document.head.appendChild(script);
              });
              if (data.url) {
                setSheetUrl(data.url);
              } else {
                setSheetError(data.error || 'Unbekannter Fehler beim Erstellen des Sheets.');
              }
            } catch (err) {
              setSheetError(err.message || 'Verbindung fehlgeschlagen.');
            } finally {
              setSheetLoading(false);
            }
          }}
          disabled={sheetLoading}
          className="flex items-center justify-center gap-3 w-full py-4 rounded-xl font-bold text-base transition-all active:scale-95"
          style={{ background: sheetLoading ? '#E5E7EB' : C.yellow, color: sheetLoading ? C.lgray : C.darkblue, boxShadow: sheetLoading ? 'none' : '0 4px 20px rgba(226,236,43,0.4)', cursor: sheetLoading ? 'not-allowed' : 'pointer' }}>
          {sheetLoading ? (
            <>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ animation:'spin 1s linear infinite' }}>
                <circle cx="12" cy="12" r="9" stroke={C.lgray} strokeWidth="2.5"/>
                <path d="M12 3a9 9 0 019 9" stroke={C.blue} strokeWidth="2.5" strokeLinecap="round"/>
              </svg>
              Wird vorbereitet …
            </>
          ) : (
            <>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 1.5l1.8 3.6 4 .6-2.9 2.8.7 4L9 10.5l-3.6 1.9.7-4L3.2 5.7l4-.6z" fill={C.darkblue}/>
              </svg>
              {sheetUrl ? 'Load Profile Analysis neu starten' : 'Load Profile Analysis'}
            </>
          )}
        </button>
        <button onClick={() => setStep(2)} className="text-sm text-center" style={{ color: C.dgray }}>← Zurück</button>
      </div>
    );
  };

  return (
    <div className="min-h-screen flex flex-col" style={{ background: C.bg }}>
      <header className="border-b bg-white px-8 py-4 flex items-center justify-between sticky top-0 z-10"
        style={{ borderColor:'#E5E7EB' }}>
        <Logo/>
        <Steps current={step}/>
        <div className="text-xs font-medium px-3 py-1.5 rounded-full" style={{ background:'#F3F4F6', color: C.dgray }}>
          Customer Success
        </div>
      </header>

      <main className="flex-1 flex items-start justify-center px-8 py-12">
        <div className="w-full max-w-2xl">
          {step === 1 && Step1()}
          {step === 2 && Step2()}
          {step === 3 && Step3()}
        </div>
      </main>

      <footer className="px-8 py-4 border-t flex items-center justify-between" style={{ borderColor:'#E5E7EB', background:'#fff' }}>
        <span className="text-xs" style={{ color: C.lgray }}>ecoplanet Green Operations GmbH · Marsstraße 46, 80335 München</span>
        <span className="text-xs" style={{ color: C.lgray }}>Intern · Customer Success</span>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
