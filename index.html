const Slide16 = () => {
  const MARKET = 10.23;
  const COMPS = [
    { key: 'term',  label: 'Terminmarkt', price: 8.38, color: C.blue,      desc: 'Fixe Jahreskontrakte' },
    { key: 'spot',  label: 'Spotmarkt',   price: 8.21, color: C.lightblue, desc: 'Tagesaktueller Preis' },
    { key: 'wind',  label: 'Wind PPA',    price: 7.64, color: '#0D9488',   desc: 'Langfristiger Windvertrag' },
    { key: 'solar', label: 'Solar PPA',   price: 6.54, color: '#22C55E',   desc: 'Langfristiger Solarvertrag' },
  ];
  const [mix, setMix] = useState({ term: 40, spot: 30, wind: 20, solar: 10 });

  const sum = Object.values(mix).reduce((a, b) => a + b, 0);
  const blended = COMPS.reduce((acc, c) => acc + (mix[c.key] / Math.max(sum, 1)) * c.price, 0);
  const savingsPct = ((MARKET - blended) / MARKET * 100).toFixed(1);
  const savingsEur = Math.round((MARKET - blended) / 100 * 12547 * 1000);

  const adjust = (key, raw) => {
    const val = Math.max(0, Math.min(100, Number(raw)));
    setMix(prev => ({ ...prev, [key]: val }));
  };

  const normalised = COMPS.map(c => ({ ...c, pct: sum > 0 ? (mix[c.key] / sum) * 100 : 0 }));

  return (
    <SlideWrapper>
      <SlideTopRow title="Strategische Energiebeschaffung: Gestalten Sie Ihren individuellen Produktmix"/>
      <div className="flex-1 grid gap-6" style={{ gridTemplateColumns: '1.1fr 1fr' }}>

        {/* LEFT — sliders */}
        <div className="flex flex-col gap-4">
          {COMPS.map(c => (
            <div key={c.key}>
              <div className="flex justify-between items-center mb-1">
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{ background: c.color }}/>
                  <span className="text-sm font-semibold" style={{ color: C.darkblue }}>{c.label}</span>
                  <span className="text-xs" style={{ color: C.dgray }}>{c.desc}</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs" style={{ color: C.dgray }}>{c.price} ct/kWh</span>
                  <span className="text-sm font-bold w-12 text-right" style={{ color: c.color }}>{mix[c.key]}%</span>
                </div>
              </div>
              <div className="relative">
                <input type="range" min="0" max="100" value={mix[c.key]}
                  onChange={e => adjust(c.key, e.target.value)}
                  className="w-full h-2 rounded-full appearance-none cursor-pointer"
                  style={{ accentColor: c.color, background: `linear-gradient(to right, ${c.color} ${mix[c.key]}%, #E5E7EB ${mix[c.key]}%)` }}/>
              </div>
            </div>
          ))}

          {/* Normalisation warning */}
          {sum !== 100 && (
            <div className="text-xs px-3 py-2 rounded-lg font-medium" style={{ background: '#FEF9C3', color: '#854D0E' }}>
              Summe: {sum}% — Balken zeigen normalisierte Verteilung (÷{sum}×100)
            </div>
          )}

          {/* Segmented bar */}
          <div className="rounded-lg overflow-hidden flex h-8 mt-1">
            {normalised.map(c => c.pct > 0 && (
              <div key={c.key} className="flex items-center justify-center text-white font-bold transition-all duration-300"
                style={{ flex: c.pct, background: c.color, fontSize: c.pct > 8 ? '11px' : '0px', minWidth: '2px' }}>
                {c.pct.toFixed(0)}%
              </div>
            ))}
          </div>
        </div>

        {/* RIGHT — result panel */}
        <div className="flex flex-col gap-3">
          {/* Blended price */}
          <div className="rounded-xl p-5 text-white" style={{ background: C.darkblue }}>
            <div className="text-xs font-semibold opacity-70 mb-1">Ihr optimierter Arbeitspreis</div>
            <div className="font-bold leading-none" style={{ fontSize: '3rem' }}>{blended.toFixed(2)}</div>
            <div className="text-sm opacity-80 mt-1">ct/kWh (Ø gewichtet)</div>
          </div>

          {/* Savings vs market */}
          <div className="rounded-xl p-5" style={{ background: C.yellow }}>
            <div className="text-xs font-semibold mb-1" style={{ color: C.darkblue }}>Einsparung vs. Marktpreis ({MARKET} ct/kWh)</div>
            <div className="font-bold leading-none" style={{ fontSize: '2.4rem', color: C.darkblue }}>-{savingsPct}%</div>
            <div className="text-sm font-semibold mt-1" style={{ color: C.darkblue }}>≈ {savingsEur > 0 ? savingsEur.toLocaleString('de-DE') : 0} € / Jahr</div>
          </div>

          {/* Component breakdown */}
          <div className="rounded-xl border p-4 flex flex-col gap-2" style={{ borderColor: C.lgray }}>
            <div className="text-xs font-bold mb-1" style={{ color: C.darkblue }}>Preiszusammensetzung</div>
            {normalised.map(c => (
              <div key={c.key} className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-sm flex-shrink-0" style={{ background: c.color }}/>
                <span className="text-xs flex-1" style={{ color: '#374151' }}>{c.label}</span>
                <span className="text-xs" style={{ color: C.dgray }}>{c.pct.toFixed(1)}%</span>
                <span className="text-xs font-semibold w-20 text-right" style={{ color: C.darkblue }}>
                  {c.pct > 0 ? `× ${c.price} = ${((c.pct/100)*c.price).toFixed(3)}` : '–'}
                </span>
              </div>
            ))}
            <div className="border-t pt-2 flex justify-between" style={{ borderColor: C.lgray }}>
              <span className="text-xs font-bold" style={{ color: C.darkblue }}>Gesamt</span>
              <span className="text-xs font-bold" style={{ color: C.blue }}>{blended.toFixed(3)} ct/kWh</span>
            </div>
          </div>
        </div>
      </div>
    </SlideWrapper>
  );
};

const SLIDES = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6, Slide7, Slide8, Slide9, Slide10, Slide11, Slide12, Slide13, Slide14, Slide15, Slide16];

/* ══════════════════════════════════════════
   APP
══════════════════════════════════════════ */
function App() {
  const [idx, setIdx] = useState(0);
  const total = SLIDES.length;
  const go = n => setIdx(Math.max(0, Math.min(total - 1, n)));

  useEffect(() => {
    const fn = e => { if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(idx + 1); if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(idx - 1); };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [idx]);

  const Current = SLIDES[idx];

  return (
    <div className="w-full max-w-screen-xl mx-auto px-4 py-6 flex flex-col gap-4 min-h-screen justify-center">
      {/* Slide */}
      <div className="w-full" key={idx} style={{ animation: 'fadeUp 0.3s ease' }}>
        <Current/>
      </div>

      {/* Nav bar */}
      <div className="flex items-center justify-between px-2">
        <button onClick={() => go(idx - 1)} disabled={idx === 0}
          className="px-6 py-2 rounded-lg font-semibold text-sm transition-opacity disabled:opacity-30"
          style={{ background: C.blue, color: '#fff' }}>← Zurück</button>

        <div className="flex items-center gap-1.5">
          {SLIDES.map((_, i) => (
            <button key={i} onClick={() => go(i)}
              className="transition-all rounded-sm"
              style={{ width: i === idx ? '20px' : '7px', height: '7px', borderRadius: i === idx ? '4px' : '50%', background: i === idx ? C.blue : C.lgray }}/>
          ))}
        </div>

        <div className="flex items-center gap-4">
          <span className="text-sm font-medium" style={{ color: C.dgray }}>{idx + 1} / {total}</span>
          <button onClick={() => go(idx + 1)} disabled={idx === total - 1}
            className="px-6 py-2 rounded-lg font-semibold text-sm transition-opacity disabled:opacity-30"
            style={{ background: C.blue, color: '#fff' }}>Weiter →</button>
        </div>
      </div>

      <div className="text-center text-xs" style={{ color: 'rgba(255,255,255,0.25)' }}>← → arrow keys</div>
    </div>
  );
}

const style = document.createElement('style');
style.textContent = `@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }`;
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
