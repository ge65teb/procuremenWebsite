<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const C = {
  blue:     '#1A2FEE',
  darkblue: '#00095B',
  lblue:    '#7582F6',
  yellow:   '#E2EC2B',
  lgray:    '#AEAEAE',
  dgray:    '#737373',
  bg:       '#F5F6FA',
};

const COMPANY = {
  name: 'NORMA Group SE',
  stromMWh: 5310, gasMWh: 7000,
  stromMarket: 10.23, gasMarket: 3.50,
  sites: 2,
};

/* ﻗﻗﻗ seeded RNG for stable data ﻗﻗﻗ */
const makeRng = seed => {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
};

/* ﻗﻗﻗ 168 h weekly load profile (kW) ﻗﻗﻗ */
const LOAD = (() => {
  const r = makeRng(42);
  const data = [];
  for (let d = 0; d < 7; d++) {
    const wd = d < 5, sat = d === 5;
    for (let h = 0; h < 24; h++) {
      let v;
      if (wd) {
        if      (h < 5)            v = 170 + r()*55;
        else if (h === 5)          v = 170 + r()*55 + (r()*200);
        else if (h === 6)          v = 600 + r()*180;
        else if (h >= 7 && h < 8)  v = 850 + r()*120;
        else if (h >= 8 && h < 17) v = 870 + r()*220 + Math.sin(h*0.9)*40;
        else if (h === 17)         v = 700 + r()*120;
        else if (h === 18)         v = 280 + r()*80;
        else                       v = 180 + r()*55;
      } else if (sat) {
        if      (h >= 6  && h < 7 ) v = 250 + r()*80;
        else if (h >= 7  && h < 13) v = 320 + r()*130;
        else if (h === 13)           v = 220 + r()*60;
        else if (h >= 14 && h < 17) v = 210 + r()*80;
        else                         v = 140 + r()*45;
      } else {
        v = 115 + r()*60 + (h >= 9 && h < 15 ? 40 + r()*30 : 0);
      }
      data.push(Math.max(100, Math.round(v)));
    }
  }
  return data;
})();

/* ﻗﻗﻗ product max capacities (kW) ﻗﻗﻗ */
const BASE_MAX = 240;
const PEAK_MAX = 760;
const WIND_MAX = 400;
const PV_MAX   = 330;

/* ﻗﻗﻗ normalised product shape profiles (0ﻗ1 per hour, index-based only) ﻗﻗﻗ */
const PROFILES = (() => {
  const rw = makeRng(7);
  const base = Array.from({length:168}, () => 1);
  const peak = Array.from({length:168}, (_, i) => {
    const d = Math.floor(i / 24), h = i % 24;
    return d < 5 && h >= 7 && h < 17 ? 1 : 0;
  });
  const wind = Array.from({length:168}, (_, i) => {
    const raw = 0.5
      + 0.22 * Math.sin(i * 0.18)
      + 0.18 * Math.cos(i * 0.31)
      + 0.12 * Math.sin(i * 0.07)
      + 0.08 * Math.cos(i * 0.55)
      + (rw() - 0.5) * 0.15;
    return Math.max(0.05, Math.min(1, raw));
  });
  const pv = Array.from({length:168}, (_, i) => {
    const h = i % 24;
    if (h < 5 || h > 20) return 0;
    const angle = (h - 5) / 15;
    return Math.max(0, Math.sin(angle * Math.PI) ** 1.2);
  });
  return { base, peak, wind, pv };
})();

/* ﻗﻗﻗ Chip ﻗﻗﻗ */
const Chip = ({ label, value, unit }) => (
  <div className="flex flex-col px-3 py-1.5 rounded-xl" style={{ background: 'rgba(255,255,255,0.09)' }}>
    <span className="text-xs" style={{ color: 'rgba(255,255,255,0.5)' }}>{label}</span>
    <span className="text-sm font-bold text-white leading-tight">
      {value}<span className="text-xs font-normal ml-1" style={{ color: 'rgba(255,255,255,0.5)' }}>{unit}</span>
    </span>
  </div>
);

/* ﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗ
   PERSISTENT HEADER
ﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗ */
const Header = ({ tab, setTab, arbeitspreis, setArbeitspreis }) => (
  <header className="sticky top-0 z-50 border-b" style={{ background: C.darkblue, borderColor: '#0d1e4a' }}>
    <div className="max-w-screen-xl mx-auto px-8 flex items-center justify-between" style={{ height: '60px' }}>
      <div className="flex items-center gap-4">
        <span className="text-white font-bold text-lg" style={{ letterSpacing: '-0.5px' }}>ecoplanet</span>
        <div className="w-px h-5 bg-white opacity-20"/>
        <span className="text-sm font-medium" style={{ color: 'rgba(255,255,255,0.75)' }}>{COMPANY.name}</span>
      </div>
      <div className="flex items-center gap-2">
        <Chip label="Strom"     value={COMPANY.stromMWh.toLocaleString('de-DE')} unit="MWh/a"/>
        <Chip label="Gas"       value={COMPANY.gasMWh.toLocaleString('de-DE')}  unit="MWh/a"/>
        {/* Editable Arbeitspreis */}
        <div className="flex flex-col px-3 py-1 rounded-xl" style={{ background:'rgba(255,255,255,0.09)' }}>
          <span className="text-xs" style={{ color:'rgba(255,255,255,0.5)' }}>Aktueller Arbeitspreis</span>
          <div className="flex items-baseline gap-1">
            <input
              type="number" step="0.01" min="0"
              value={arbeitspreis}
              onChange={e => setArbeitspreis(parseFloat(e.target.value)||0)}
              className="font-bold text-white text-sm leading-tight bg-transparent border-none outline-none w-16 p-0"
              style={{ color:'white' }}
            />
            <span className="text-xs font-normal" style={{ color:'rgba(255,255,255,0.5)' }}>ct/kWh</span>
          </div>
        </div>
        <Chip label="Markt Gas"  value={COMPANY.gasMarket}   unit="ct/kWh"/>
        <Chip label="Standorte"  value={COMPANY.sites.toLocaleString('de-DE')} unit=""/>
      </div>
    </div>
    <div className="max-w-screen-xl mx-auto px-8 flex gap-1">
      {['Strategie', 'Portfoliomanagement'].map(t => (
        <button key={t} onClick={() => setTab(t)}
          className="px-6 py-2.5 text-sm font-semibold rounded-t-lg transition-all"
          style={{ background: tab===t ? C.bg : 'transparent', color: tab===t ? C.darkblue : 'rgba(255,255,255,0.55)', borderBottom: tab===t ? `2px solid ${C.bg}` : '2px solid transparent' }}>
          {t}
        </button>
      ))}
    </div>
  </header>
);

/* ﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗ
   STRATEGIE TAB ﻗ interactive Lastgang
ﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗﻗ */
const PRODUCTS = [
  { key:'base',  label:'Base',     color:C.darkblue, fillColor:'#1a3a8a', desc:'Durchgﺣ۳ngiges Grundlastband (24/7)', max:BASE_MAX },
  { key:'peak',  label:'Peak',     color:C.blue,     fillColor:C.blue,    desc:'Wochentage MoﻗFr, 07:00ﻗ17:00 Uhr', max:PEAK_MAX },
  { key:'wind',  label:'Wind PPA', color:'#0D9488',  fillColor:'#0D9488', desc:'Variables Windstromprofil (24/7)', max:WIND_MAX },
  { key:'pv',    label:'PV-PPA',   color:'#16A34A',  fillColor:'#16A34A', desc:'Tﺣ۳gliches Sonnenstrahlungsprofil', max:PV_MAX   },
];
// Reference prices per product (ct/kWh) and optimal slider preset
const PRODUCT_PRICES = { base:9.05, peak:11.38, wind:8.00, pv:6.2, spot:13.11 };

const SHEETS_CSV     = 'https://docs.google.com/spreadsheets/d/1jOfwcirxhYVyIDVJKzGzJpJEnYZYoWmwaE7ldByQEcI/gviz/tq?tqx=out:csv&gid=0';
const SHEETS_REF_CSV = 'https://docs.google.com/spreadsheets/d/1jOfwcirxhYVyIDVJKzGzJpJEnYZYoWmwaE7ldByQEcI/gviz/tq?tqx=out:csv&sheet=8)%20Ref%20Price';

const StrategieTab = ({ arbeitspreis }) => {
  const [sliders, setSliders] = useState({ base:100, peak:100, wind:100, pv:0 });
  const [loadData, setLoadData] = useState(null); // null until fetched ﻗ no synthetic fallback
  const [actualMWh, setActualMWh] = useState(0);
  const [loadStatus, setLoadStatus] = useState('loading');
  const [refVolumes, setRefVolumes] = useState(null);

  /* Fetch real load profile from Google Sheets on mount */
  useEffect(() => {
    fetch(SHEETS_CSV)
      .then(r => r.text())
      .then(text => {
        /* Proper quoted-CSV parser ﻗ handles "174,640" (German decimal comma) */
        const parseCSVRow = r => {
          const cells=[]; let c='', q=false;
          for (const ch of r) {
            if (ch==='"') { q=!q; }
            else if (ch===',' && !q) { cells.push(c); c=''; }
            else { c+=ch; }
          }
          cells.push(c);
          return cells;
        };
        const rows = text.trim().split('\n');
        const pts = [];
        rows.forEach(row => {
          const cols = parseCSVRow(row);
          const ts  = (cols[0]||'').trim();
          const raw = (cols[1]||'').replace(',','.').trim();
          const val = parseFloat(raw);
          if (!ts || isNaN(val)) return;
          const [datePart, timePart] = ts.split(' ');
          if (!datePart || !timePart) return;
          const [d,m,y] = datePart.split('.');
          const [h] = timePart.split(':');
          const date = new Date(2000+parseInt(y), parseInt(m)-1, parseInt(d), parseInt(h));
          pts.push({ date, val });
        });
        if (pts.length < 100) { setLoadStatus('error'); return; }
        /* Total annual MWh (15-min intervals ﻗ ﺣ 0.25h ﺣﺓ 1000) */
        const totalMWh = Math.round(pts.reduce((a,p)=>a+p.val,0) * 0.25 / 1000);
        /* Average weekly profile: Mon=0 ﻗ۵ Sun=6, 24h each */
        const buckets = Array.from({length:168}, ()=>[]);
        pts.forEach(({date, val}) => {
          const dow = (date.getDay()+6)%7; // Mon=0
          const hr  = date.getHours();
          buckets[dow*24+hr].push(val);
        });
        const weekly = buckets.map(b => b.length ? b.reduce((a,v)=>a+v,0)/b.length : 0);
        setLoadData(weekly);
        setActualMWh(totalMWh);
        setLoadStatus('live');
      })
      .catch(() => setLoadStatus('error'));
  }, []);

  /* Fetch reference volumes from 8) Ref Price */
  useEffect(() => {
    const parseDE = s => {
      const c = (s||'').replace(/[^\d.,]/g,'');
      if (!c) return 0;
      if (c.includes(',')) return parseFloat(c.replace(/\./g,'').replace(',','.')) || 0;
      const parts = c.split('.');
      if (parts.length > 1 && parts[parts.length-1].length === 3) return parseFloat(c.replace(/\./g,'')) || 0;
      return parseFloat(c) || 0;
    };
    const parseRow = row => {
      const cells=[]; let cur='', inQ=false;
      for (const ch of row) {
        if (ch==='"') { inQ=!inQ; }
        else if (ch===',' && !inQ) { cells.push(cur.trim()); cur=''; }
        else { cur+=ch; }
      }
      cells.push(cur.trim());
      return cells;
    };
    fetch(SHEETS_REF_CSV)
      .then(r => r.text())
      .then(text => {
        const rows = text.trim().split('\n').map(parseRow);
        const quarters = ['Q1','Q2','Q3','Q4','Y'];
        let baseMWh=0, peakMWh=0, windMWh=0, pvMWh=0, spotMWh=0;
        let baseCost=0, peakCost=0;
        let windPrice=PRODUCT_PRICES.wind, pvPrice=PRODUCT_PRICES.pv, spotPrice=PRODUCT_PRICES.spot;
        rows.forEach(c => {
          if (quarters.includes(c[1])) {
            const bMWh=parseDE(c[4]), bPrice=parseDE(c[3]);
            const pMWh=parseDE(c[7]), pPrice=parseDE(c[6]);
            baseMWh+=bMWh; baseCost+=bMWh*bPrice;
            peakMWh+=pMWh; peakCost+=pMWh*pPrice;
          }
          const label = (c[9]||'').trim();
          // Actual labels after parseRow trim: "Wind" (2110 MWh), "Solar" (0 MWh), "- Spot" (1572 MWh)
          if (label === 'Wind')    { windMWh  = parseDE(c[11]); }
          if (label === 'Solar')   { pvMWh    = parseDE(c[11]); }
          if (label === '- Spot')  { spotMWh  = parseDE(c[11]); }
          // Wind & spot prices not in this block; windPrice/spotPrice use PRODUCT_PRICES defaults
        });
        if (baseMWh+peakMWh+windMWh > 0)
          setRefVolumes({
            baseMWh, peakMWh, windMWh, pvMWh, spotMWh,
            basePrice: baseMWh > 0 ? baseCost/baseMWh/10 : PRODUCT_PRICES.base,
            peakPrice: peakMWh > 0 ? peakCost/peakMWh/10 : PRODUCT_PRICES.peak,
            windPrice, pvPrice, spotPrice,
          });
      })
      .catch(() => {});
  }, []);

  /* Product capacities: 100% slider = reference MWh when refVolumes is loaded */
  const productMaxes = useMemo(() => {
    if (!refVolumes) return { base:BASE_MAX, peak:PEAK_MAX, wind:WIND_MAX, pv:PV_MAX };
    const profSum = prof => prof.reduce((a,b)=>a+b, 0);
    const toMax = (mwh, prof) => Math.max(1, Math.round(mwh * 1000 / (profSum(prof) * 52)));
    return {
      base: toMax(refVolumes.baseMWh, PROFILES.base),
      peak: toMax(refVolumes.peakMWh, PROFILES.peak),
      wind: toMax(refVolumes.windMWh, PROFILES.wind),
      pv:   refVolumes.pvMWh > 0 ? toMax(refVolumes.pvMWh, PROFILES.pv) : PV_MAX,
    };
  }, [refVolumes]);

  /* Auto-apply reference portfolio sliders when ref data arrives */
  useEffect(() => {
    if (refVolumes) setSliders({ base:100, peak:100, wind:100, pv:0 });
  }, [refVolumes]);

  /* Dynamic product prices from sheet; falls back to constants if not yet loaded */
  const productPrices = useMemo(() => {
    if (!refVolumes) return PRODUCT_PRICES;
    return {
      base: refVolumes.basePrice,
      peak: refVolumes.peakPrice,
      wind: refVolumes.windPrice,
      pv:   refVolumes.pvPrice > 0 ? refVolumes.pvPrice : PRODUCT_PRICES.pv,
      spot: refVolumes.spotPrice,
    };
  }, [refVolumes]);

  /* SVG layout constants */
  const W=900, H=280, PL=46, PB=32, PT=14, PR=10;
  const CW = W-PL-PR, CH = H-PT-PB;
  const YMAX = useMemo(() => loadData ? Math.ceil(Math.max(...loadData)*1.15/100)*100 : 1400, [loadData]);
  const xp = i  => PL + (i / 167) * CW;
  const yp = v  => PT + CH - (v / YMAX) * CH;
  const yBottom = PT + CH;

  /* Compute stacks ﻗ index 6 = raw uncapped total for ﺣberdeckung */
  const stacks = useMemo(() => {
    if (!loadData) return [];
    const sf = { base:sliders.base/100, peak:sliders.peak/100, wind:sliders.wind/100, pv:sliders.pv/100 };
    const pm = productMaxes;
    return loadData.map((load, i) => {
      const r1 = sf.base * pm.base * PROFILES.base[i];
      const r2 = r1 + sf.peak * pm.peak * PROFILES.peak[i];
      const r3 = r2 + sf.wind * pm.wind * PROFILES.wind[i];
      const r4 = r3 + sf.pv * pm.pv * PROFILES.pv[i];
      const s1 = Math.min(r1, load);
      const s2 = Math.min(r2, load);
      const s3 = Math.min(r3, load);
      const s4 = Math.min(r4, load);
      return [0, s1, s2, s3, s4, load, r4];
    });
  }, [sliders, loadData, productMaxes]);

  /* Build SVG area path between two value arrays */
  const areaPath = (top, bot) => {
    let d = `M${xp(0).toFixed(1)},${yp(top[0]).toFixed(1)}`;
    for (let i=1;i<top.length;i++) d += ` L${xp(i).toFixed(1)},${yp(top[i]).toFixed(1)}`;
    for (let i=top.length-1;i>=0;i--) d += ` L${xp(i).toFixed(1)},${yp(bot[i]).toFixed(1)}`;
    return d + ' Z';
  };

  /* Load curve polyline */
  const loadLine = loadData ? loadData.map((v,i) => `${i===0?'M':'L'}${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(' ') : '';

  /* Day markers */
  const DAY_LABELS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  const dayX = d => xp(d * 24);
  const dayMidX = d => xp(d * 24 + 12);

  /* Y gridlines ﻗ dynamic based on YMAX */
  const Y_GRID = useMemo(() => [0, Math.round(YMAX*0.25/50)*50, Math.round(YMAX*0.5/50)*50, Math.round(YMAX*0.75/50)*50, YMAX], [YMAX]);

  /* Coverage stats */
  const coverage = useMemo(() => {
    const empty = { perProduct:['0','0','0','0'], ueberdeckung:'0' };
    if (!loadData) return empty;
    const pm = productMaxes;
    const totLoad = loadData.reduce((a,b) => a+b, 0);
    const sf = { base:sliders.base/100, peak:sliders.peak/100, wind:sliders.wind/100, pv:sliders.pv/100 };
    const keys = ['base','peak','wind','pv'];
    const profs = [PROFILES.base, PROFILES.peak, PROFILES.wind, PROFILES.pv];
    const maxes = [pm.base, pm.peak, pm.wind, pm.pv];
    const perProduct = keys.map((k,idx) => {
      const total = loadData.reduce((acc, load, i) => acc + Math.min(sf[k] * maxes[idx] * profs[idx][i], load), 0);
      return (total / totLoad * 100).toFixed(1);
    });
    const ueberdeckung = (loadData.reduce((acc, load, i) => {
      const raw = sf.base*pm.base*PROFILES.base[i] + sf.peak*pm.peak*PROFILES.peak[i]
                + sf.wind*pm.wind*PROFILES.wind[i] + sf.pv*pm.pv*PROFILES.pv[i];
      return acc + Math.max(0, raw - load);
    }, 0) / totLoad * 100).toFixed(1);
    return { perProduct, ueberdeckung };
  }, [sliders, loadData, productMaxes]);

  /* Net stacked contribution per product (for bar chart) */
  const stackedCoverage = useMemo(() => {
    if (!loadData || stacks.length === 0) return { base:0, peak:0, wind:0, pv:0, unhedged:0, ueb:0 };
    const totLoad = loadData.reduce((a,b)=>a+b, 0);
    const nets = [0,1,2,3].map(idx => stacks.reduce((a,s)=>a+(s[idx+1]-s[idx]), 0) / totLoad * 100);
    const unhedged = stacks.reduce((a,s)=>a+(s[5]-s[4]), 0) / totLoad * 100;
    const ueb = stacks.reduce((a,s)=>a+Math.max(0,s[6]-s[5]), 0) / totLoad * 100;
    return { base:nets[0], peak:nets[1], wind:nets[2], pv:nets[3], unhedged, ueb };
  }, [stacks, loadData]);

  /* Dynamic spot price: increases with PPA usage (merit-order effect) */
  const dynamicSpotPrice = useMemo(() => {
    if (!loadData) return productPrices.spot;
    const pm = productMaxes;
    const totLoad = loadData.reduce((a,b)=>a+b, 0);
    const sf = { wind:sliders.wind/100, pv:sliders.pv/100 };
    const windCov = loadData.reduce((acc,load,i)=>acc+Math.min(sf.wind*pm.wind*PROFILES.wind[i],load), 0) / totLoad;
    const pvCov   = loadData.reduce((acc,load,i)=>acc+Math.min(sf.pv*pm.pv*PROFILES.pv[i],load), 0) / totLoad;
    return productPrices.spot * (1 + 0.18 * (windCov + pvCov));
  }, [sliders, loadData, productMaxes, productPrices]);

  /* Blended portfolio price from stacked non-overlapping layers */
  const blendedPrice = useMemo(() => {
    if (!loadData || stacks.length === 0) return 0;
    const totLoad = loadData.reduce((a,b) => a+b, 0);
    const pcts = [0,1,2,3].map(idx =>
      stacks.reduce((acc, s) => acc + (s[idx+1] - s[idx]), 0) / totLoad
    );
    const unhedged = stacks.reduce((acc, s) => acc + (s[5] - s[4]), 0) / totLoad;
    const prices = [productPrices.base, productPrices.peak, productPrices.wind, productPrices.pv];
    return pcts.reduce((acc, pct, i) => acc + pct * prices[i], 0) + unhedged * dynamicSpotPrice;
  }, [stacks, dynamicSpotPrice, loadData, productPrices]);

  const savingsCt  = arbeitspreis - blendedPrice;
  const savingsPct = arbeitspreis > 0 ? (savingsCt / arbeitspreis * 100) : 0;
  const savingsEur = Math.round(savingsCt / 100 * actualMWh * 1000);

  const optimise = () => {
    /* Reference portfolio: productMaxes calibrated so 100% = ref MWh from sheet */
    if (refVolumes) { setSliders({ base:100, peak:100, wind:100, pv:0 }); return; }
    if (!loadData) return;

    /* Fallback: constraint-based grid search */
    const pm = productMaxes;
    const totLoad = loadData.reduce((a,b)=>a+b, 0);
    const evalCfg = (b,pk,w,pv) => {
      const sf = { base:b/100, peak:pk/100, wind:w/100, pv:pv/100 };
      let over=0;
      const sl = loadData.map((load,i) => {
        const r1=sf.base*pm.base*PROFILES.base[i];
        const r2=r1+sf.peak*pm.peak*PROFILES.peak[i];
        const r3=r2+sf.wind*pm.wind*PROFILES.wind[i];
        const r4=r3+sf.pv*pm.pv*PROFILES.pv[i];
        const s1=Math.min(r1,load), s2=Math.min(r2,load), s3=Math.min(r3,load), s4=Math.min(r4,load);
        over+=Math.max(0,r4-load);
        return [0,s1,s2,s3,s4,load,r4];
      });
      const cov=sl.reduce((a,s)=>a+s[4],0)/totLoad*100;
      const ueb=over/totLoad*100;
      const termCov=sl.reduce((a,s)=>a+s[2],0)/totLoad*100;
      const windCov=loadData.reduce((a,load,i)=>a+Math.min(sf.wind*pm.wind*PROFILES.wind[i],load),0)/totLoad;
      const pvCov=loadData.reduce((a,load,i)=>a+Math.min(sf.pv*pm.pv*PROFILES.pv[i],load),0)/totLoad;
      const spotDyn=productPrices.spot*(1+0.18*(windCov+pvCov));
      const pcts=[0,1,2,3].map(idx=>sl.reduce((a,s)=>a+(s[idx+1]-s[idx]),0)/totLoad);
      const unhedgedFrac=sl.reduce((a,s)=>a+(s[5]-s[4]),0)/totLoad;
      const price=pcts.reduce((a,pct,i)=>a+pct*[productPrices.base,productPrices.peak,productPrices.wind,productPrices.pv][i],0)+unhedgedFrac*spotDyn;
      return { cov, ueb, price, termCov };
    };
    let best=null, bestPrice=Infinity;
    for(let b=0;b<=100;b+=5) for(let pk=0;pk<=100;pk+=5) for(let w=0;w<=100;w+=5) for(let pv=0;pv<=100;pv+=5){
      const {cov,ueb,price,termCov}=evalCfg(b,pk,w,pv);
      if(cov>=80 && ueb<6 && termCov>=40 && price<bestPrice){ bestPrice=price; best={base:b,peak:pk,wind:w,pv}; }
    }
    if(best) setSliders(best);
  };

    const t = Math.min(1, (v - 6) / 8);

            </span>

              <span style={{ width:20, height:2, background:'#D97706', display:'inline-block', borderRadius:2, opacity:0.8 }}/>
              Stop-Loss
            </span>
            <span className="ml-auto" style={{ color:'#9CA3AF' }}>ﻗ؛/MWh</span>
          </div>
        </div>

        {/* Notifications panel */}
        <div className="flex flex-col gap-2" style={{ width:248, minWidth:248 }}>
          <div className="text-xs font-semibold mb-0.5" style={{ color:C.dgray }}>Handelssignale</div>
          {notifications.length === 0 && (
            <div className="rounded-lg p-3 text-xs" style={{ background:'#F9FAFB', color:'#9CA3AF', border:'1px dashed #E5E7EB' }}>
              Signale erscheinen wﺣ۳hrend der Animationﻗ۵
            </div>
          )}
          {notifications.map(n => (
            <div key={n.id} className="slide-in-right rounded-xl p-3 text-xs"
              style={{ background:n.bg, border:`1.5px solid ${n.border}` }}>
              <div className="flex items-center gap-1.5 mb-0.5">
                <span className="font-bold" style={{ color:n.color }}>{n.icon}</span>
                <span className="font-bold text-xs" style={{ color:n.color }}>{n.title}</span>
              </div>
              <div className="font-medium leading-snug mb-0.5" style={{ color:'#1F2937' }}>{n.msg}</div>
              <div style={{ color:'#6B7280' }}>{n.date}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Controls */}
      <div className="flex items-center gap-4 mt-3">
        {step < N - 1 && !playing && (
          <button onClick={() => setPlaying(true)}
            className="px-5 py-2 rounded-lg text-sm font-semibold text-white"
            style={{ background: C.blue }}>
            ﻗﭘ Abspielen
          </button>
        )}
        {playing && (
          <button onClick={() => setPlaying(false)}
            className="px-5 py-2 rounded-lg text-sm font-semibold"
            style={{ background:'#F3F4F6', color:C.darkblue }}>
            ﻗﺕ Pause
          </button>
        )}
        {step > 0 && (
          <button onClick={replay}
            className="px-5 py-2 rounded-lg text-sm font-semibold"
            style={{ background:'#F3F4F6', color:C.darkblue }}>
            ﻗﭦ Wiederholen
          </button>
        )}
        <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background:'#E5E7EB' }}>
          <div className="h-full rounded-full transition-all" style={{ width:`${(step/(N-1))*100}%`, background:C.blue }}/>
        </div>
        <span className="text-xs" style={{ color:C.dgray }}>{labels[step] || labels[0]}</span>
      </div>

      {/* Live KPI boxes */}
      <div className="flex gap-3 mt-3">
        {/* Box 1: Running market price average */}
        <div className="flex-1 rounded-xl p-3" style={{ background:'#EFF6FF', border:'1.5px solid #BFDBFE' }}>
          <div className="text-xs mb-1" style={{ color:'#1D4ED8' }}>ﺣ Marktpreis (laufend)</div>
          <div className="text-xl font-bold" style={{ color:'#1E40AF' }}>
            {step > 0 ? `${avgMarket.toFixed(2).replace('.',',')} ﻗ؛/MWh` : 'ﻗ'}
          </div>
          <div className="text-xs mt-0.5" style={{ color:'#6B7280' }}>{step > 0 ? `${step+1} Handelstage` : 'Animation starten'}</div>
        </div>
        {/* Box 2: Running fixierung average */}
        <div className="flex-1 rounded-xl p-3" style={{ background: avgFix != null ? '#F0FDF4' : '#F9FAFB', border:`1.5px solid ${avgFix != null ? '#86EFAC' : '#E5E7EB'}` }}>
          <div className="text-xs mb-1" style={{ color: avgFix != null ? '#166534' : '#9CA3AF' }}>ﺣ Fixierungspreis</div>
          <div className="text-xl font-bold" style={{ color: avgFix != null ? '#15803D' : '#D1D5DB' }}>
            {avgFix != null ? `${avgFix.toFixed(2).replace('.',',')} ﻗ؛/MWh` : 'ﻗ'}
          </div>
          <div className="text-xs mt-0.5" style={{ color:'#6B7280' }}>
            {fixPrices.length === 0 ? 'Keine Fixierung bisher' : `${fixPrices.length} Fixierung${fixPrices.length > 1 ? 'en' : ''}`}
          </div>
        </div>
        {/* Box 3: Savings ﻗ only shown after animation completes */}
        {done && savingsPct != null && (
          <div className="flex-1 rounded-xl p-3 slide-in-right" style={{ background:'#FFFBEB', border:'1.5px solid #FCD34D' }}>
            <div className="text-xs mb-1" style={{ color:'#92400E' }}>Einsparung durch Fixierungen</div>
            <div className="text-xl font-bold" style={{ color: savingsPct >= 0 ? '#15803D' : '#DC2626' }}>
              {savingsPct >= 0 ? '+' : ''}{savingsPct.toFixed(1).replace('.',',')} %
            </div>
            <div className="text-xs mt-0.5" style={{ color:'#6B7280' }}>vs. ﺣ Marktpreis</div>
          </div>
        )}
      </div>
    </div>
  );
};
