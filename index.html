<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ecoplanet – Energiebeschaffung NORMA Group SE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #F5F6FA; margin: 0; }
    .clip-arrow { clip-path: polygon(0 0, calc(100% - 48px) 0, 100% 50%, calc(100% - 48px) 100%, 0 100%); }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 9999px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
    @keyframes pulse-yellow { 0%,100%{box-shadow:0 0 0 0 rgba(226,236,43,.5)}50%{box-shadow:0 0 0 8px rgba(226,236,43,0)}}
    .pulse-btn { animation: pulse-yellow 2s infinite; }
    @keyframes slideInRight { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
    .slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const C = {
  blue:     '#1A2FEE',
  darkblue: '#00095B',
  lblue:    '#7582F6',
  yellow:   '#E2EC2B',
  lgray:    '#AEAEAE',
  dgray:    '#737373',
  bg:       '#F5F6FA',
};

const COMPANY = {
  name: 'NORMA Group SE',
  stromMWh: 12547, gasMWh: 7000,
  stromMarket: 10.23, gasMarket: 3.50,
  sites: 2500,
};

/* ─── seeded RNG for stable data ─── */
const makeRng = seed => {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
};

/* ─── 168 h weekly load profile (kW) ─── */
const LOAD = (() => {
  const r = makeRng(42);
  const data = [];
  for (let d = 0; d < 7; d++) {
    const wd = d < 5, sat = d === 5;
    for (let h = 0; h < 24; h++) {
      let v;
      if (wd) {
        if      (h < 5)            v = 170 + r()*55;
        else if (h === 5)          v = 170 + r()*55 + (r()*200);
        else if (h === 6)          v = 600 + r()*180;
        else if (h >= 7 && h < 8)  v = 850 + r()*120;
        else if (h >= 8 && h < 17) v = 870 + r()*220 + Math.sin(h*0.9)*40;
        else if (h === 17)         v = 700 + r()*120;
        else if (h === 18)         v = 280 + r()*80;
        else                       v = 180 + r()*55;
      } else if (sat) {
        if      (h >= 6  && h < 7 ) v = 250 + r()*80;
        else if (h >= 7  && h < 13) v = 320 + r()*130;
        else if (h === 13)           v = 220 + r()*60;
        else if (h >= 14 && h < 17) v = 210 + r()*80;
        else                         v = 140 + r()*45;
      } else {
        v = 115 + r()*60 + (h >= 9 && h < 15 ? 40 + r()*30 : 0);
      }
      data.push(Math.max(100, Math.round(v)));
    }
  }
  return data;
})();

/* ─── product max capacities (kW) ─── */
const BASE_MAX = 240;
const PEAK_MAX = 760;
const WIND_MAX = 400;
const PV_MAX   = 330;

/* ─── normalised product shape profiles (0–1 per hour) ─── */
const PROFILES = (() => {
  const rw = makeRng(7);
  const base = LOAD.map(() => 1);
  const peak = LOAD.map((_, i) => {
    const d = Math.floor(i / 24), h = i % 24;
    return d < 5 && h >= 7 && h < 17 ? 1 : 0;
  });
  const wind = LOAD.map((_, i) => {
    const t = i;
    const raw = 0.5
      + 0.22 * Math.sin(t * 0.18)
      + 0.18 * Math.cos(t * 0.31)
      + 0.12 * Math.sin(t * 0.07)
      + 0.08 * Math.cos(t * 0.55)
      + (rw() - 0.5) * 0.15;
    return Math.max(0.05, Math.min(1, raw));
  });
  const pv = LOAD.map((_, i) => {
    const h = i % 24;
    if (h < 5 || h > 20) return 0;
    const angle = (h - 5) / 15;
    return Math.max(0, Math.sin(angle * Math.PI) ** 1.2);
  });
  return { base, peak, wind, pv };
})();

/* ─── Chip ─── */
const Chip = ({ label, value, unit }) => (
  <div className="flex flex-col px-3 py-1.5 rounded-xl" style={{ background: 'rgba(255,255,255,0.09)' }}>
    <span className="text-xs" style={{ color: 'rgba(255,255,255,0.5)' }}>{label}</span>
    <span className="text-sm font-bold text-white leading-tight">
      {value}<span className="text-xs font-normal ml-1" style={{ color: 'rgba(255,255,255,0.5)' }}>{unit}</span>
    </span>
  </div>
);

/* ═══════════════════════════════════════════
   PERSISTENT HEADER
═══════════════════════════════════════════ */
const Header = ({ tab, setTab, arbeitspreis, setArbeitspreis }) => (
  <header className="sticky top-0 z-50 border-b" style={{ background: C.darkblue, borderColor: '#0d1e4a' }}>
    <div className="max-w-screen-xl mx-auto px-8 flex items-center justify-between" style={{ height: '60px' }}>
      <div className="flex items-center gap-4">
        <span className="text-white font-bold text-lg" style={{ letterSpacing: '-0.5px' }}>ecoplanet</span>
        <div className="w-px h-5 bg-white opacity-20"/>
        <span className="text-sm font-medium" style={{ color: 'rgba(255,255,255,0.75)' }}>{COMPANY.name}</span>
      </div>
      <div className="flex items-center gap-2">
        <Chip label="Strom"     value={COMPANY.stromMWh.toLocaleString('de-DE')} unit="MWh/a"/>
        <Chip label="Gas"       value={COMPANY.gasMWh.toLocaleString('de-DE')}  unit="MWh/a"/>
        {/* Editable Arbeitspreis */}
        <div className="flex flex-col px-3 py-1 rounded-xl" style={{ background:'rgba(255,255,255,0.09)' }}>
          <span className="text-xs" style={{ color:'rgba(255,255,255,0.5)' }}>Aktueller Arbeitspreis</span>
          <div className="flex items-baseline gap-1">
            <input
              type="number" step="0.01" min="0"
              value={arbeitspreis}
              onChange={e => setArbeitspreis(parseFloat(e.target.value)||0)}
              className="font-bold text-white text-sm leading-tight bg-transparent border-none outline-none w-16 p-0"
              style={{ color:'white' }}
            />
            <span className="text-xs font-normal" style={{ color:'rgba(255,255,255,0.5)' }}>ct/kWh</span>
          </div>
        </div>
        <Chip label="Markt Gas"  value={COMPANY.gasMarket}   unit="ct/kWh"/>
        <Chip label="Standorte"  value={COMPANY.sites.toLocaleString('de-DE')} unit=""/>
      </div>
    </div>
    <div className="max-w-screen-xl mx-auto px-8 flex gap-1">
      {['Strategie', 'Portfoliomanagement'].map(t => (
        <button key={t} onClick={() => setTab(t)}
          className="px-6 py-2.5 text-sm font-semibold rounded-t-lg transition-all"
          style={{ background: tab===t ? C.bg : 'transparent', color: tab===t ? C.darkblue : 'rgba(255,255,255,0.55)', borderBottom: tab===t ? `2px solid ${C.bg}` : '2px solid transparent' }}>
          {t}
        </button>
      ))}
    </div>
  </header>
);

/* ═══════════════════════════════════════════
   STRATEGIE TAB — interactive Lastgang
═══════════════════════════════════════════ */
const PRODUCTS = [
  { key:'base',  label:'Base',     color:C.darkblue, fillColor:'#1a3a8a', desc:'Durchgängiges Grundlastband (24/7)', max:BASE_MAX },
  { key:'peak',  label:'Peak',     color:C.blue,     fillColor:C.blue,    desc:'Wochentage Mo–Fr, 07:00–17:00 Uhr', max:PEAK_MAX },
  { key:'wind',  label:'Wind PPA', color:'#0D9488',  fillColor:'#0D9488', desc:'Variables Windstromprofil (24/7)', max:WIND_MAX },
  { key:'pv',    label:'PV-PPA',   color:'#16A34A',  fillColor:'#16A34A', desc:'Tägliches Sonnenstrahlungsprofil', max:PV_MAX   },
];
// Reference prices per product (ct/kWh) and optimal slider preset
const PRODUCT_PRICES = { base:8.38, peak:8.60, wind:7.64, pv:6.54, spot:9.80 };
const OPTIMAL_SLIDERS = { base:65, peak:72, wind:55, pv:45 };

const StrategieTab = ({ arbeitspreis }) => {
  const [sliders, setSliders] = useState({ base:60, peak:65, wind:40, pv:30 });

  /* SVG layout constants */
  const W=900, H=280, PL=46, PB=32, PT=14, PR=10;
  const CW = W-PL-PR, CH = H-PT-PB;
  const YMAX = 1450;
  const xp = i  => PL + (i / (LOAD.length - 1)) * CW;
  const yp = v  => PT + CH - (v / YMAX) * CH;
  const yBottom = PT + CH;

  /* Compute stacks */
  const stacks = useMemo(() => {
    const sf = { base:sliders.base/100, peak:sliders.peak/100, wind:sliders.wind/100, pv:sliders.pv/100 };
    return LOAD.map((load, i) => {
      const s1 = Math.min(sf.base * BASE_MAX * PROFILES.base[i], load);
      const s2 = Math.min(s1 + sf.peak * PEAK_MAX * PROFILES.peak[i], load);
      const s3 = Math.min(s2 + sf.wind * WIND_MAX * PROFILES.wind[i], load);
      const s4 = Math.min(s3 + sf.pv * PV_MAX * PROFILES.pv[i], load);
      return [0, s1, s2, s3, s4, load];
    });
  }, [sliders]);

  /* Build SVG area path between two value arrays */
  const areaPath = (top, bot) => {
    let d = `M${xp(0).toFixed(1)},${yp(top[0]).toFixed(1)}`;
    for (let i=1;i<top.length;i++) d += ` L${xp(i).toFixed(1)},${yp(top[i]).toFixed(1)}`;
    for (let i=top.length-1;i>=0;i--) d += ` L${xp(i).toFixed(1)},${yp(bot[i]).toFixed(1)}`;
    return d + ' Z';
  };

  /* Load curve polyline */
  const loadLine = LOAD.map((v,i) => `${i===0?'M':'L'}${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(' ');

  /* Day markers */
  const DAY_LABELS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  const dayX = d => xp(d * 24);
  const dayMidX = d => xp(d * 24 + 12);

  /* Y gridlines */
  const Y_GRID = [0, 350, 700, 1050, 1400];

  /* Coverage stats */
  const coverage = useMemo(() => {
    const totLoad = LOAD.reduce((a,b) => a+b, 0);
    const sf = { base:sliders.base/100, peak:sliders.peak/100, wind:sliders.wind/100, pv:sliders.pv/100 };
    const keys = ['base','peak','wind','pv'];
    const profs = [PROFILES.base, PROFILES.peak, PROFILES.wind, PROFILES.pv];
    const maxes = [BASE_MAX, PEAK_MAX, WIND_MAX, PV_MAX];
    return keys.map((k,idx) => {
      const total = LOAD.reduce((acc, load, i) => acc + Math.min(sf[k] * maxes[idx] * profs[idx][i], load), 0);
      return (total / totLoad * 100).toFixed(1);
    });
  }, [sliders]);

  /* Blended portfolio price from stacked non-overlapping layers */
  const blendedPrice = useMemo(() => {
    const totLoad = LOAD.reduce((a,b) => a+b, 0);
    const pcts = [0,1,2,3].map(idx =>
      stacks.reduce((acc, s) => acc + (s[idx+1] - s[idx]), 0) / totLoad
    );
    const unhedged = stacks.reduce((acc, s) => acc + (s[5] - s[4]), 0) / totLoad;
    const prices = [PRODUCT_PRICES.base, PRODUCT_PRICES.peak, PRODUCT_PRICES.wind, PRODUCT_PRICES.pv];
    return pcts.reduce((acc, pct, i) => acc + pct * prices[i], 0) + unhedged * PRODUCT_PRICES.spot;
  }, [stacks]);

  const savingsCt  = arbeitspreis - blendedPrice;
  const savingsPct = arbeitspreis > 0 ? (savingsCt / arbeitspreis * 100) : 0;
  const savingsEur = Math.round(savingsCt / 100 * COMPANY.stromMWh * 1000);

  const optimise = () => setSliders(OPTIMAL_SLIDERS);

  const setSlider = (key, val) => setSliders(p => ({ ...p, [key]: Number(val) }));

  return (
    <div className="max-w-screen-xl mx-auto px-8 py-5 flex flex-col gap-5">

      {/* Chart card */}
      <div className="bg-white rounded-2xl border" style={{ borderColor: C.lgray }}>
        <div className="px-6 pt-5 pb-2 flex items-start justify-between">
          <div>
            <div className="text-xs font-medium" style={{ color: C.dgray }}>Netzbezug (Hauptwerk)</div>
            <div className="text-xs mt-0.5" style={{ color: '#9CA3AF' }}>kW · Durchschnittliche Woche</div>
          </div>
          <div className="flex items-center gap-5">
            {PRODUCTS.map(p => (
              <div key={p.key} className="flex items-center gap-1.5 text-xs" style={{ color: C.dgray }}>
                <div className="w-3 h-3 rounded-sm" style={{ background: p.fillColor, opacity: 0.8 }}/>
                {p.label}
              </div>
            ))}
            <div className="flex items-center gap-1.5 text-xs" style={{ color: '#9CA3AF' }}>
              <div className="w-3 h-3 rounded-sm bg-gray-200"/>
              Ungedeckt
            </div>
          </div>
        </div>

        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ display:'block' }}>
          {/* Horizontal grid lines */}
          {Y_GRID.map(v => (
            <g key={v}>
              <line x1={PL} y1={yp(v)} x2={W-PR} y2={yp(v)} stroke="#F3F4F6" strokeWidth="1"/>
              <text x={PL-5} y={yp(v)+3.5} textAnchor="end" fontSize="9" fill="#9CA3AF">{v}</text>
            </g>
          ))}

          {/* Vertical day separators */}
          {[1,2,3,4,5,6].map(d => (
            <line key={d} x1={dayX(d)} y1={PT} x2={dayX(d)} y2={yBottom} stroke="#E5E7EB" strokeWidth="0.8"/>
          ))}

          {/* Stacked product fills */}
          {/* Unhedged */}
          <path d={areaPath(stacks.map(s=>s[5]), stacks.map(s=>s[4]))} fill="#E5E7EB" opacity="0.75"/>
          {/* PV */}
          <path d={areaPath(stacks.map(s=>s[4]), stacks.map(s=>s[3]))} fill="#16A34A" opacity="0.65"/>
          {/* Wind */}
          <path d={areaPath(stacks.map(s=>s[3]), stacks.map(s=>s[2]))} fill="#0D9488" opacity="0.65"/>
          {/* Peak */}
          <path d={areaPath(stacks.map(s=>s[2]), stacks.map(s=>s[1]))} fill={C.blue} opacity="0.65"/>
          {/* Base */}
          <path d={areaPath(stacks.map(s=>s[1]), stacks.map(s=>s[0]))} fill={C.darkblue} opacity="0.75"/>

          {/* Load profile line — drawn on top */}
          <path d={loadLine} fill="none" stroke={C.darkblue} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>

          {/* Day labels */}
          {DAY_LABELS.map((label, d) => (
            <text key={d} x={dayMidX(d)} y={H-6} textAnchor="middle" fontSize="9.5" fill={C.dgray}>{label}</text>
          ))}

          {/* X-axis baseline */}
          <line x1={PL} y1={yBottom} x2={W-PR} y2={yBottom} stroke="#E5E7EB" strokeWidth="1"/>
        </svg>
      </div>

      {/* Sliders + Stats */}
      <div className="grid grid-cols-2 gap-5">

        {/* Sliders card */}
        <div className="bg-white rounded-2xl border p-6" style={{ borderColor: C.lgray }}>
          <div className="flex items-start justify-between mb-5">
            <div>
              <h3 className="font-bold text-base" style={{ color: C.darkblue }}>Beschaffungsprodukte strukturieren</h3>
              <p className="text-xs mt-0.5" style={{ color: C.dgray }}>Anteil der Produkte im Lastgang anpassen — Visualisierung aktualisiert sich live</p>
            </div>
            <button onClick={optimise}
              className="flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-sm flex-shrink-0 active:scale-95 transition-transform"
              style={{ background:C.yellow, color:C.darkblue, boxShadow:'0 2px 10px rgba(226,236,43,.4)' }}>
              <svg width="13" height="13" viewBox="0 0 16 16"><path d="M8 1l1.8 3.6 4 .6-2.9 2.8.7 4L8 10l-3.6 1.9.7-4L2.2 5.2l4-.6z" fill={C.darkblue}/></svg>
              Strategie optimieren
            </button>
          </div>
          <div className="flex flex-col gap-5">
            {PRODUCTS.map((p,idx) => (
              <div key={p.key}>
                <div className="flex justify-between items-center mb-1.5">
                  <div className="flex items-center gap-2">
                    <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{ background: p.fillColor }}/>
                    <span className="text-sm font-bold" style={{ color: C.darkblue }}>{p.label}</span>
                    <span className="text-xs" style={{ color: C.dgray }}>{p.desc}</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-xs font-medium" style={{ color: C.dgray }}>
                      {Math.round(sliders[p.key]/100 * p.max)} kW
                    </span>
                    <span className="text-sm font-bold w-10 text-right" style={{ color: p.color }}>{sliders[p.key]}%</span>
                  </div>
                </div>
                <input type="range" min="0" max="100" value={sliders[p.key]}
                  onChange={e => setSlider(p.key, e.target.value)}
                  className="w-full"
                  style={{ background:`linear-gradient(to right,${p.fillColor} ${sliders[p.key]}%,#E5E7EB ${sliders[p.key]}%)`, accentColor:p.fillColor }}/>
                <div className="flex justify-between mt-0.5 text-xs" style={{ color:'#9CA3AF' }}>
                  <span>0%</span>
                  <span style={{ color:p.color, fontWeight:600 }}>{coverage[idx]}% des Lastgangs gedeckt</span>
                  <span>100%</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Coverage stats card */}
        <div className="flex flex-col gap-4">

          {/* Product breakdown */}
          <div className="bg-white rounded-2xl border p-5 flex-1" style={{ borderColor: C.lgray }}>
            <div className="font-bold text-sm mb-4" style={{ color: C.darkblue }}>Abdeckung im Lastgang</div>
            {PRODUCTS.map((p, idx) => (
              <div key={p.key} className="flex items-center gap-3 mb-3 last:mb-0">
                <div className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: p.fillColor }}/>
                <span className="text-sm flex-1" style={{ color:'#374151' }}>{p.label}</span>
                <div className="flex-1 h-2 rounded-full overflow-hidden bg-gray-100">
                  <div className="h-full rounded-full transition-all duration-500"
                    style={{ width:`${coverage[idx]}%`, background: p.fillColor, opacity:0.8 }}/>
                </div>
                <span className="text-sm font-bold w-12 text-right" style={{ color: p.color }}>{coverage[idx]}%</span>
              </div>
            ))}
            {/* Unhedged */}
            <div className="flex items-center gap-3 mt-3 pt-3 border-t" style={{ borderColor:'#F3F4F6' }}>
              <div className="w-2.5 h-2.5 rounded-sm flex-shrink-0 bg-gray-300"/>
              <span className="text-sm flex-1" style={{ color: C.dgray }}>Ungedeckt (Spot)</span>
              <div className="flex-1 h-2 rounded-full overflow-hidden bg-gray-100">
                <div className="h-full rounded-full transition-all duration-500 bg-gray-300"
                  style={{ width:`${Math.max(0, 100 - coverage.reduce((a,b)=>a+parseFloat(b),0)).toFixed(1)}%` }}/>
              </div>
              <span className="text-sm font-bold w-12 text-right" style={{ color: C.dgray }}>
                {Math.max(0, 100 - coverage.reduce((a,b)=>a+parseFloat(b),0)).toFixed(1)}%
              </span>
            </div>
          </div>

          {/* Product characteristics */}
          <div className="bg-white rounded-2xl border p-5" style={{ borderColor: C.lgray }}>
            <div className="font-bold text-sm mb-3" style={{ color: C.darkblue }}>Produkteigenschaften</div>
            <div className="grid grid-cols-2 gap-3">
              {[
                { label:'Base', tag:'24/7 Konstant', note:'Flat band, kein Profil-risiko', color:C.darkblue },
                { label:'Peak', tag:'Mo–Fr 7–17 Uhr', note:'Höchste Lastzeiten abdecken', color:C.blue },
                { label:'Wind PPA', tag:'Variable 24/7', note:'Nacht & Winterstunden stark', color:'#0D9488' },
                { label:'PV-PPA',   tag:'Taglicht', note:'Mittag-Peak, saisonale Stärke', color:'#16A34A' },
              ].map(c => (
                <div key={c.label} className="rounded-xl p-3" style={{ background:'#F9FAFB', border:`1.5px solid #F0F0F0` }}>
                  <div className="flex items-center gap-1.5 mb-1">
                    <div className="w-2 h-2 rounded-sm" style={{ background:c.color }}/>
                    <span className="text-xs font-bold" style={{ color:c.color }}>{c.label}</span>
                  </div>
                  <div className="text-xs font-semibold" style={{ color:C.darkblue }}>{c.tag}</div>
                  <div className="text-xs mt-0.5" style={{ color:C.dgray }}>{c.note}</div>
                </div>
              ))}
            </div>
          </div>

        </div>
      </div>

      {/* ── Preisliche Bewertung ── */}
      <div className="bg-white rounded-2xl border p-6" style={{ borderColor:C.lgray }}>
        <div className="flex items-center justify-between mb-5">
          <div>
            <h3 className="font-bold text-base" style={{ color:C.darkblue }}>Preisliche Bewertung</h3>
            <p className="text-xs mt-0.5" style={{ color:C.dgray }}>Arbeitspreis im Header anpassen · Portfoliopreis wird live berechnet</p>
          </div>
        </div>
        <div className="flex items-stretch gap-4">

          {/* Current Arbeitspreis */}
          <div className="flex-1 rounded-xl p-5 flex flex-col justify-between" style={{ background:'#F9FAFB', border:`1.5px solid ${C.lgray}` }}>
            <div className="text-xs font-semibold mb-2" style={{ color:C.dgray }}>Aktueller Arbeitspreis</div>
            <div>
              <span className="font-bold" style={{ color:C.darkblue, fontSize:'2.4rem', lineHeight:1 }}>{arbeitspreis.toFixed(2)}</span>

            </div>
            <div className="text-xs mt-2" style={{ color:'#9CA3AF' }}>Eingabe im Header — Basiswert für Einsparungsrechnung</div>
          </div>

          {/* Arrow */}

          {/* Portfolio price breakdown */}
          <div className="flex-1 rounded-xl p-5" style={{ background:'#F0F4FF', border:`1.5px solid ${C.lblue}` }}>
            <div className="text-xs font-semibold mb-2" style={{ color:C.darkblue }}>Berechneter Portfoliopreis</div>
            <div className="mb-3">
              <span className="font-bold" style={{ color:C.blue, fontSize:'2.4rem', lineHeight:1 }}>{blendedPrice.toFixed(2)}</span>
              <span className="text-sm ml-1" style={{ color:C.dgray }}>ct/kWh</span>
            </div>
            <div className="flex flex-col gap-1">
              {(() => {
                const totLoad = LOAD.reduce((a,b)=>a+b,0);
                const layerPcts = [0,1,2,3].map(idx =>
                  stacks.reduce((acc,s)=>acc+(s[idx+1]-s[idx]),0)/totLoad*100
                );
                const spotPct = stacks.reduce((acc,s)=>acc+(s[5]-s[4]),0)/totLoad*100;
                return [
                  { key:'base',  label:'Base',            color:'#1a3a8a', pct:layerPcts[0] },
                  { key:'peak',  label:'Peak',            color:C.blue,    pct:layerPcts[1] },
                  { key:'wind',  label:'Wind PPA',        color:'#0D9488', pct:layerPcts[2] },
                  { key:'pv',    label:'PV-PPA',          color:'#16A34A', pct:layerPcts[3] },
                  { key:'spot',  label:'Ungedeckt (Spot)',color:C.dgray,   pct:spotPct       },
                ];
              })().map(({ key, label, color, pct }) => {
                return pct > 0.5 ? (
                  <div key={key} className="flex items-center gap-2 text-xs">
                    <div className="w-2 h-2 rounded-sm flex-shrink-0" style={{ background:color }}/>
                    <span className="flex-1" style={{ color:'#374151' }}>{label}</span>
                    <span style={{ color:C.dgray }}>{pct.toFixed(1)}%</span>
                    <span className="font-semibold w-20 text-right" style={{ color:C.darkblue }}>
                      {(pct/100 * PRODUCT_PRICES[key]).toFixed(3)} ct
                    </span>
                  </div>
                ) : null;
              })}
            </div>
          </div>

          {/* Arrow */}
          <div className="flex items-center px-2 text-2xl" style={{ color:C.lgray }}>→</div>

          {/* Savings */}
          <div className="flex-1 rounded-xl p-5 flex flex-col justify-between"
            style={{ background: savingsCt > 0 ? C.yellow : '#FEF2F2', border:`1.5px solid ${savingsCt>0?'#c8d400':'#FCA5A5'}` }}>
            <div className="text-xs font-semibold mb-2" style={{ color:C.darkblue }}>Einsparung vs. Arbeitspreis</div>
            <div>
              <div className="font-bold" style={{ color:savingsCt>0?C.darkblue:'#DC2626', fontSize:'2.4rem', lineHeight:1 }}>
                {savingsCt>0?'-':'+'}{ Math.abs(savingsPct).toFixed(1)}%
              </div>
              <div className="text-sm font-bold mt-1" style={{ color:savingsCt>0?C.darkblue:'#DC2626' }}>
                {savingsCt>0?'≈ -':'+'}{ Math.abs(savingsEur).toLocaleString('de-DE')} €/Jahr
              </div>
            </div>
            <div className="text-xs mt-2" style={{ color:C.darkblue, opacity:0.6 }}>
              {arbeitspreis.toFixed(2)} → {blendedPrice.toFixed(2)} ct/kWh · {COMPANY.stromMWh.toLocaleString('de-DE')} MWh/a
            </div>
          </div>

        </div>
      </div>

    </div>
  );
};

  ];

  const lerp = (a,b,t) => a+(b-a)*t;
  const interp = (day, col) => {
    for (let j=0; j<wp.length-1; j++) {
      if (day>=wp[j][0] && day<=wp[j+1][0]) {
        const t=(day-wp[j][0])/(wp[j+1][0]-wp[j][0]);
        return lerp(wp[j][col], wp[j+1][col], t);

  };

  const blue=[], orange=[], green=[], labels=[];

  return { labels, blue, orange, green, N, E1, E2, E3, E4 };
})();

const CrisisChart = () => {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const { labels, blue, orange, green, N, E1, E2, E3, E4 } = CRISIS_DATA;

  useEffect(() => {
    if (!playing) return;
    if (step >= N-1) { setPlaying(false); return; }
    const t = setTimeout(() => setStep(s=>s+1), 35);
    return () => clearTimeout(t);
  }, [playing, step]);

  useEffect(() => {
    const add = (id,color,bg,border,icon,title,msg,date) =>
      setNotifications(prev => prev.find(n=>n.id===id) ? prev : [...prev,{id,color,bg,border,icon,title,msg,date}]);
    if (step===E1) add(1,'#92400E','#FEF3C7','#FCD34D','⚠',
      'Stop-Loss Warnung',
      'Marktpreis überschreitet Stop-Loss — erhöhte Marktvolatilität',
      labels[E1]);
    if (step===E2) add(2,'#991B1B','#FEF2F2','#FCA5A5','💥',
      'Explosion Nord Stream II',
      'Direkte Fixierung auf Grund von Stop-Loss zu 265 €/MWh',
      '26. Sep \'22');
    if (step===E3) add(3,'#1E40AF','#EFF6FF','#BFDBFE','↓',
      'Marktkorrektur',
      'Marktpreis fällt unter Stop-Loss — Normalisierung der Marktlage',
      labels[E3]);
    if (step===E4) add(4,'#166534','#DCFCE7','#86EFAC','✓',
      'Take-Profit ausgelöst',
      'Marktpreis unterschreitet Take-Profit — günstige Fixierungsmöglichkeit',
      labels[E4]);
  }, [step]);

  const replay = () => { setStep(0); setNotifications([]); setPlaying(true); };

  const W=820, H=260, PAD={l:52,r:20,t:16,b:32};
  const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;
  const yMin=40, yMax=305;
  const xOf = i => PAD.l+(i/(N-1))*cw;
  const yOf = v => PAD.t+(1-(v-yMin)/(yMax-yMin))*ch;
  const mkPath = arr => {
    if (step<1) return '';
    return 'M '+arr.slice(0,step+1).map((v,i)=>`${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' L ');
  };

  // Month tick positions (1st of each month)
  const monthTicks = [];
  const startD = new Date(2022,2,1);
  for (let i=0; i<N; i++) {
    const d = new Date(startD); d.setDate(startD.getDate()+i);
    if (d.getDate()===1) {
      const mo=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()];
      monthTicks.push({ i, label: mo + (d.getFullYear()===2023?' \'23':' \'22') });
    }
  }

  const EVENTS = [{e:E1,c:'#D97706'},{e:E2,c:'#DC2626'},{e:E3,c:'#2563EB'},{e:E4,c:'#16A34A'}];

  return (
    <div>
      <div className="flex gap-5">
        {/* Chart */}
        <div className="flex-1">
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
            {[50,100,150,200,250,300].map(v=>(
              <g key={v}>
                <line x1={PAD.l} y1={yOf(v)} x2={W-PAD.r} y2={yOf(v)} stroke="#E5E7EB" strokeWidth="1" strokeDasharray="4 3"/>
                <text x={PAD.l-6} y={yOf(v)+4} fontSize="10" fill="#9CA3AF" textAnchor="end">{v}</text>
              </g>
            ))}
            {monthTicks.map(({i,label})=>(
              <text key={i} x={xOf(i)} y={H-4} fontSize="9" fill="#6B7280" textAnchor="middle">{label}</text>
            ))}
            {/* Green & orange always visible in full — reference lines */}
            {(() => {
              const fp = arr => 'M '+arr.map((v,i)=>`${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' L ');
              return <>
                <path d={fp(green)}  stroke="#16A34A" strokeWidth="2"   fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                <path d={fp(orange)} stroke="#D97706" strokeWidth="2"   fill="none" strokeLinecap="round" strokeLinejoin="round"/>
              </>;
            })()}
            {/* Blue market line — animated */}
            {step>0 && <path d={mkPath(blue)} stroke="#2563EB" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>}
            {EVENTS.map(({e,c})=> step>=e && (
              <line key={e} x1={xOf(e)} y1={PAD.t} x2={xOf(e)} y2={H-PAD.b} stroke={c} strokeWidth="1.5" strokeDasharray="3 2" opacity="0.7"/>
            ))}
            {step>0 && <circle cx={xOf(step)} cy={yOf(blue[step])} r="4" fill="#2563EB" stroke="white" strokeWidth="2"/>}
          </svg>
          <div className="flex gap-5 mt-1 text-xs" style={{color:C.dgray}}>
            {[{c:'#2563EB',l:'Terminmarktpreis'},{c:'#D97706',l:'Stop-Loss'},{c:'#16A34A',l:'Take-Profit (ecoplanet)'}].map(({c,l})=>(
              <span key={l} className="flex items-center gap-1.5">
                <span style={{width:18,height:3,background:c,display:'inline-block',borderRadius:2}}/>
                {l}
              </span>
            ))}
            <span className="ml-auto" style={{color:'#9CA3AF'}}>€/MWh</span>
          </div>
        </div>
        {/* Notifications */}
        <div className="flex flex-col gap-3" style={{width:260,minWidth:260}}>
          <div className="text-xs font-semibold mb-1" style={{color:C.dgray}}>Handelssignale</div>
          {notifications.length===0 && (
            <div className="rounded-lg p-3 text-xs" style={{background:'#F9FAFB',color:'#9CA3AF',border:'1px dashed #E5E7EB'}}>
              Signale erscheinen während der Animation…
            </div>
          )}
          {notifications.map(n=>(
            <div key={n.id} className="slide-in-right rounded-xl p-4 text-xs"
              style={{background:n.bg,border:`1.5px solid ${n.border}`}}>
              <div className="flex items-center gap-2 mb-1">
                <span className="font-bold text-sm" style={{color:n.color}}>{n.icon}</span>
                <span className="font-bold" style={{color:n.color}}>{n.title}</span>
              </div>
              <div className="font-medium leading-snug mb-1" style={{color:'#1F2937'}}>{n.msg}</div>
              <div style={{color:'#6B7280'}}>{n.date}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Controls */}
      <div className="flex items-center gap-4 mt-4">
        {step<N-1 && !playing && (
          <button onClick={()=>setPlaying(true)}
            className="px-5 py-2 rounded-lg text-sm font-semibold text-white"
            style={{background:C.darkblue}}>
            ▶ Abspielen
          </button>
        )}
        {playing && (
          <button onClick={()=>setPlaying(false)}
            className="px-5 py-2 rounded-lg text-sm font-semibold"
            style={{background:'#F3F4F6',color:C.darkblue}}>
            ⏸ Pause
          </button>
        )}
        {step>0 && (
          <button onClick={replay}
            className="px-5 py-2 rounded-lg text-sm font-semibold"
            style={{background:'#F3F4F6',color:C.darkblue}}>
            ↺ Wiederholen
          </button>
        )}
        <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{background:'#E5E7EB'}}>
          <div className="h-full rounded-full transition-all" style={{width:`${(step/(N-1))*100}%`,background:C.darkblue}}/>
        </div>
        <span className="text-xs" style={{color:C.dgray}}>{labels[step]||labels[0]}</span>
      </div>
    </div>
  );
};

    71.40,71.11,70.80,70.58,70.29,69.37,68.44,67.85,67.46,67.30,
  ];
  const N = 100;
  const EVENT1 = 19, EVENT2 = 69, EVENT3 = 80, EVENT4 = 84;
  return { labels, blue, green, orange, EVENT1, EVENT2, EVENT3, EVENT4, N };
})();

const CurrentMarketChart = () => {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const { labels, blue, green, orange, EVENT1, EVENT2, EVENT3, EVENT4, N } = CM_DATA;

  useEffect(() => {
    if (!playing) return;
    if (step >= N - 1) { setPlaying(false); return; }
    const t = setTimeout(() => setStep(s => s + 1), 50);
    return () => clearTimeout(t);
  }, [playing, step]);

  // Trigger notifications at event indices
  useEffect(() => {
    const EVTS = [
      { id:1, at:EVENT1, color:'#166534', bg:'#DCFCE7', border:'#86EFAC', icon:'✓',
        title:'Erste Fixierung', msg:`Fixierungspreis: ${blue[EVENT1].toFixed(2).replace('.',',')} €/MWh` },
      { id:2, at:EVENT2, color:'#166534', bg:'#DCFCE7', border:'#86EFAC', icon:'✓',
        title:'Zweite Fixierung', msg:`Fixierungspreis: ${blue[EVENT2].toFixed(2).replace('.',',')} €/MWh` },
      { id:3, at:EVENT3, color:'#991B1B', bg:'#FEE2E2', border:'#FCA5A5', icon:'⚡',
        title:'Geopolitisches Risiko', msg:'Ausbruch des Irankriegs' },
      { id:4, at:EVENT4, color:'#92400E', bg:'#FEF3C7', border:'#FCD34D', icon:'🛡',
        title:'Stop-Loss Absicherung', msg:'Absicherung vor zu hohen Preissteigerungen am Stop-Loss' },
    ];
    EVTS.forEach(evt => {
      if (step === evt.at) {
        setNotifications(prev => prev.find(n=>n.id===evt.id) ? prev : [...prev, { ...evt, date: labels[evt.at] }]);
      }
    });
  }, [step]);

  const replay = () => { setStep(0); setNotifications([]); setPlaying(true); };

  // Live KPI calculations
  const avgMarket = step >= 0 ? (blue.slice(0, step+1).reduce((a,b)=>a+b,0) / (step+1)) : 0;
  const fixPrices = [];
  if (step >= EVENT1) fixPrices.push(blue[EVENT1]);
  if (step >= EVENT2) fixPrices.push(blue[EVENT2]);
  const avgFix = fixPrices.length > 0 ? fixPrices.reduce((a,b)=>a+b,0) / fixPrices.length : null;
  const done = step >= N - 1;
  const savingsPct = done && avgFix != null ? ((avgMarket - avgFix) / avgMarket * 100) : null;

  // SVG dimensions
  const W = 820, H = 240, PAD = { l:52, r:20, t:16, b:32 };
  const cw = W - PAD.l - PAD.r;
  const ch = H - PAD.t - PAD.b;
  const yMin = 64, yMax = 106;
  const xOf = i => PAD.l + (i / (N-1)) * cw;
  const yOf = v => PAD.t + (1 - (v - yMin)/(yMax - yMin)) * ch;

  // All three lines animate together (reveal up to current step)
  const mkPath = (arr, n) => n > 0
    ? 'M ' + arr.slice(0, n+1).map((v,i)=>`${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' L ')
    : '';
  const bluePath   = mkPath(blue,   step);
  const orangePath = mkPath(orange, step);
  const greenPath  = mkPath(green,  step);

  const gridYs = [68, 72, 76, 80, 84, 88, 92, 96, 100];
  const monthTicks = [0, 19, 40, 61, 81];
  const monthNames = ['Nov', 'Dez', 'Jan', 'Feb', 'Mär'];

  return (
    <div>
      <div className="flex gap-5">
        {/* Chart */}
        <div className="flex-1 relative">
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:'block', overflow:'visible' }}>
            {/* Grid lines */}
            {gridYs.map(v => (
              <g key={v}>
                <line x1={PAD.l} y1={yOf(v)} x2={W-PAD.r} y2={yOf(v)}
                  stroke="#E5E7EB" strokeWidth="1" strokeDasharray="4 3"/>
                <text x={PAD.l - 5} y={yOf(v)+4} fontSize="10" fill="#9CA3AF" textAnchor="end">{v}</text>
              </g>
            ))}
            {/* Month labels */}
            {monthTicks.map((idx,i) => (
              <text key={i} x={xOf(idx)} y={H - 4} fontSize="10" fill="#6B7280" textAnchor="middle">{monthNames[i]}</text>
            ))}
            {/* All three lines — animated together */}
            {step > 0 && <path d={orangePath} stroke="#D97706" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>}
            {step > 0 && <path d={greenPath}  stroke="#16A34A" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>}
            {step > 0 && <path d={bluePath}   stroke="#2563EB" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>}
            {/* Event vertical markers */}
            {step >= EVENT1 && <line x1={xOf(EVENT1)} y1={PAD.t} x2={xOf(EVENT1)} y2={H-PAD.b} stroke="#16A34A" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.7"/>}
            {step >= EVENT2 && <line x1={xOf(EVENT2)} y1={PAD.t} x2={xOf(EVENT2)} y2={H-PAD.b} stroke="#16A34A" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.7"/>}
            {step >= EVENT3 && <line x1={xOf(EVENT3)} y1={PAD.t} x2={xOf(EVENT3)} y2={H-PAD.b} stroke="#991B1B" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.7"/>}
            {step >= EVENT4 && <line x1={xOf(EVENT4)} y1={PAD.t} x2={xOf(EVENT4)} y2={H-PAD.b} stroke="#D97706" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.7"/>}
            {/* Current value dot */}
            {step > 0 && <circle cx={xOf(step)} cy={yOf(blue[step])} r="4" fill="#2563EB" stroke="white" strokeWidth="2"/>}
          </svg>
          {/* Legend */}
          <div className="flex gap-5 mt-1 text-xs" style={{ color:C.dgray }}>
            <span className="flex items-center gap-1.5">
              <span style={{ width:20, height:3, background:'#2563EB', display:'inline-block', borderRadius:2 }}/>
              Terminmarktpreis
            </span>
            <span className="flex items-center gap-1.5">
              <span style={{ width:20, height:2, background:'#16A34A', display:'inline-block', borderRadius:2, opacity:0.8 }}/>
              Take-Profit
            </span>
            <span className="flex items-center gap-1.5">
              <span style={{ width:20, height:2, background:'#D97706', display:'inline-block', borderRadius:2, opacity:0.8 }}/>
              Stop-Loss
            </span>
            <span className="ml-auto" style={{ color:'#9CA3AF' }}>€/MWh</span>
          </div>
        </div>

        {/* Notifications panel */}
        <div className="flex flex-col gap-2" style={{ width:248, minWidth:248 }}>
          <div className="text-xs font-semibold mb-0.5" style={{ color:C.dgray }}>Handelssignale</div>
          {notifications.length === 0 && (
            <div className="rounded-lg p-3 text-xs" style={{ background:'#F9FAFB', color:'#9CA3AF', border:'1px dashed #E5E7EB' }}>
              Signale erscheinen während der Animation…
            </div>
          )}
          {notifications.map(n => (
            <div key={n.id} className="slide-in-right rounded-xl p-3 text-xs"
              style={{ background:n.bg, border:`1.5px solid ${n.border}` }}>
              <div className="flex items-center gap-1.5 mb-0.5">
                <span className="font-bold" style={{ color:n.color }}>{n.icon}</span>
                <span className="font-bold text-xs" style={{ color:n.color }}>{n.title}</span>
              </div>
              <div className="font-medium leading-snug mb-0.5" style={{ color:'#1F2937' }}>{n.msg}</div>
              <div style={{ color:'#6B7280' }}>{n.date}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Controls */}
      <div className="flex items-center gap-4 mt-3">
        {step < N - 1 && !playing && (
          <button onClick={() => setPlaying(true)}
            className="px-5 py-2 rounded-lg text-sm font-semibold text-white"
            style={{ background: C.blue }}>
            ▶ Abspielen
          </button>
        )}
        {playing && (
          <button onClick={() => setPlaying(false)}
            className="px-5 py-2 rounded-lg text-sm font-semibold"
            style={{ background:'#F3F4F6', color:C.darkblue }}>
            ⏸ Pause
          </button>
        )}
        {step > 0 && (
          <button onClick={replay}
            className="px-5 py-2 rounded-lg text-sm font-semibold"
            style={{ background:'#F3F4F6', color:C.darkblue }}>
            ↺ Wiederholen
          </button>
        )}
        <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background:'#E5E7EB' }}>
          <div className="h-full rounded-full transition-all" style={{ width:`${(step/(N-1))*100}%`, background:C.blue }}/>
        </div>
        <span className="text-xs" style={{ color:C.dgray }}>{labels[step] || labels[0]}</span>
      </div>

      {/* Live KPI boxes */}
      <div className="flex gap-3 mt-3">
        {/* Box 1: Running market price average */}
        <div className="flex-1 rounded-xl p-3" style={{ background:'#EFF6FF', border:'1.5px solid #BFDBFE' }}>
          <div className="text-xs mb-1" style={{ color:'#1D4ED8' }}>Ø Marktpreis (laufend)</div>
          <div className="text-xl font-bold" style={{ color:'#1E40AF' }}>
            {step > 0 ? `${avgMarket.toFixed(2).replace('.',',')} €/MWh` : '—'}
          </div>
          <div className="text-xs mt-0.5" style={{ color:'#6B7280' }}>{step > 0 ? `${step+1} Handelstage` : 'Animation starten'}</div>
        </div>
        {/* Box 2: Running fixierung average */}
        <div className="flex-1 rounded-xl p-3" style={{ background: avgFix != null ? '#F0FDF4' : '#F9FAFB', border:`1.5px solid ${avgFix != null ? '#86EFAC' : '#E5E7EB'}` }}>
          <div className="text-xs mb-1" style={{ color: avgFix != null ? '#166534' : '#9CA3AF' }}>Ø Fixierungspreis</div>
          <div className="text-xl font-bold" style={{ color: avgFix != null ? '#15803D' : '#D1D5DB' }}>
            {avgFix != null ? `${avgFix.toFixed(2).replace('.',',')} €/MWh` : '—'}
          </div>
          <div className="text-xs mt-0.5" style={{ color:'#6B7280' }}>
            {fixPrices.length === 0 ? 'Keine Fixierung bisher' : `${fixPrices.length} Fixierung${fixPrices.length > 1 ? 'en' : ''}`}
          </div>
        </div>
        {/* Box 3: Savings — only shown after animation completes */}
        {done && savingsPct != null && (
          <div className="flex-1 rounded-xl p-3 slide-in-right" style={{ background:'#FFFBEB', border:'1.5px solid #FCD34D' }}>
            <div className="text-xs mb-1" style={{ color:'#92400E' }}>Einsparung durch Fixierungen</div>
            <div className="text-xl font-bold" style={{ color: savingsPct >= 0 ? '#15803D' : '#DC2626' }}>
              {savingsPct >= 0 ? '+' : ''}{savingsPct.toFixed(1).replace('.',',')} %
            </div>
            <div className="text-xs mt-0.5" style={{ color:'#6B7280' }}>vs. Ø Marktpreis</div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════
   PORTFOLIOMANAGEMENT TAB
═══════════════════════════════════════════ */
const PortfolioTab = () => {
  const [scenario, setScenario] = useState('crisis');

  return (
    <div className="max-w-screen-xl mx-auto px-8 py-6 flex flex-col gap-5">

      {/* ── Scenario slides ── */}
      <div className="bg-white rounded-2xl border overflow-hidden" style={{ borderColor:C.lgray }}>
        {/* Slide selector */}
        <div className="flex border-b" style={{ borderColor:'#F3F4F6' }}>
          {Object.values(SCENARIOS).map(sc => (
            <button key={sc.id} onClick={() => setScenario(sc.id)}
              className="flex-1 px-6 py-4 text-left transition-all"
              style={{ background: scenario===sc.id ? '#F9FAFB' : 'white', borderBottom: scenario===sc.id ? `3px solid ${C.blue}` : '3px solid transparent' }}>
              <div className="text-sm font-bold" style={{ color: scenario===sc.id ? C.darkblue : C.dgray }}>{sc.title}</div>
              <div className="text-xs mt-0.5" style={{ color:'#9CA3AF' }}>{sc.subtitle}</div>
            </button>
          ))}
        </div>
        {/* Chart */}
        <div className="p-6">
          <div className="mb-2">
            <h3 className="font-bold text-base" style={{ color:C.darkblue }}>
              Marktfolgesystem — {SCENARIOS[scenario].title}
            </h3>
            <p className="text-xs mt-0.5" style={{ color:C.dgray }}>
              {scenario === 'crisis'
                ? 'EEX CAL-23 · Mär 2022 – Jan 2023 · Stop-Loss / Take-Profit Handelssystem · 4 Fixierungssignale'
                : 'EEX Terminmarkt Jan–Apr 2026 · Stop-Loss 8,90 ct/kWh · Take-Profit 8,02 ct/kWh'}
            </p>
          </div>
          {scenario === 'crisis'
            ? <CrisisChart key="crisis"/>
            : <CurrentMarketChart key="current"/>
          }
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('Strategie');
  const [arbeitspreis, setArbeitspreis] = useState(COMPANY.stromMarket);
  return (
    <div className="min-h-screen" style={{ background:C.bg }}>
      <Header tab={tab} setTab={setTab} arbeitspreis={arbeitspreis} setArbeitspreis={setArbeitspreis}/>
      {tab==='Strategie'
        ? <StrategieTab arbeitspreis={arbeitspreis}/>
        : <PortfolioTab/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
