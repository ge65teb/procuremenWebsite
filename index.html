<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ecoplanet – Energiebeschaffung NORMA Group SE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #F5F6FA; margin: 0; }
    .clip-arrow { clip-path: polygon(0 0, calc(100% - 48px) 0, 100% 50%, calc(100% - 48px) 100%, 0 100%); }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 9999px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
    @keyframes pulse-yellow { 0%,100%{box-shadow:0 0 0 0 rgba(226,236,43,.5)}50%{box-shadow:0 0 0 8px rgba(226,236,43,0)}}
    .pulse-btn { animation: pulse-yellow 2s infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const C = {
  blue:     '#1A2FEE',
  darkblue: '#00095B',
  lblue:    '#7582F6',
  yellow:   '#E2EC2B',
  lgray:    '#AEAEAE',
  dgray:    '#737373',
  bg:       '#F5F6FA',
};

const COMPANY = {
  name: 'NORMA Group SE',
  stromMWh: 12547, gasMWh: 7000,
  stromMarket: 10.23, gasMarket: 3.50,
  sites: 2500,
};

/* ─── seeded RNG for stable data ─── */
const makeRng = seed => {
  let s = seed;
  return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
};

/* ─── 168 h weekly load profile (kW) ─── */
const LOAD = (() => {
  const r = makeRng(42);
  const data = [];
  for (let d = 0; d < 7; d++) {
    const wd = d < 5, sat = d === 5;
    for (let h = 0; h < 24; h++) {
      let v;
      if (wd) {
        if      (h < 5)            v = 170 + r()*55;
        else if (h === 5)          v = 170 + r()*55 + (r()*200);
        else if (h === 6)          v = 600 + r()*180;
        else if (h >= 7 && h < 8)  v = 850 + r()*120;
        else if (h >= 8 && h < 17) v = 870 + r()*220 + Math.sin(h*0.9)*40;
        else if (h === 17)         v = 700 + r()*120;
        else if (h === 18)         v = 280 + r()*80;
        else                       v = 180 + r()*55;
      } else if (sat) {
        if      (h >= 6  && h < 7 ) v = 250 + r()*80;
        else if (h >= 7  && h < 13) v = 320 + r()*130;
        else if (h === 13)           v = 220 + r()*60;
        else if (h >= 14 && h < 17) v = 210 + r()*80;
        else                         v = 140 + r()*45;
      } else {
        v = 115 + r()*60 + (h >= 9 && h < 15 ? 40 + r()*30 : 0);
      }
      data.push(Math.max(100, Math.round(v)));
    }
  }
  return data;
})();

/* ─── product max capacities (kW) ─── */
const BASE_MAX = 240;
const PEAK_MAX = 760;
const WIND_MAX = 400;
const PV_MAX   = 330;

/* ─── normalised product shape profiles (0–1 per hour) ─── */
const PROFILES = (() => {
  const rw = makeRng(7);
  const base = LOAD.map(() => 1);
  const peak = LOAD.map((_, i) => {
    const d = Math.floor(i / 24), h = i % 24;
    return d < 5 && h >= 7 && h < 17 ? 1 : 0;
  });
  const wind = LOAD.map((_, i) => {
    const t = i;
    const raw = 0.5
      + 0.22 * Math.sin(t * 0.18)
      + 0.18 * Math.cos(t * 0.31)
      + 0.12 * Math.sin(t * 0.07)
      + 0.08 * Math.cos(t * 0.55)
      + (rw() - 0.5) * 0.15;
    return Math.max(0.05, Math.min(1, raw));
  });
  const pv = LOAD.map((_, i) => {
    const h = i % 24;
    if (h < 5 || h > 20) return 0;
    const angle = (h - 5) / 15;
    return Math.max(0, Math.sin(angle * Math.PI) ** 1.2);
  });
  return { base, peak, wind, pv };
})();

/* ─── Chip ─── */
const Chip = ({ label, value, unit }) => (
  <div className="flex flex-col px-3 py-1.5 rounded-xl" style={{ background: 'rgba(255,255,255,0.09)' }}>
    <span className="text-xs" style={{ color: 'rgba(255,255,255,0.5)' }}>{label}</span>
    <span className="text-sm font-bold text-white leading-tight">
      {value}<span className="text-xs font-normal ml-1" style={{ color: 'rgba(255,255,255,0.5)' }}>{unit}</span>
    </span>
  </div>
);

/* ═══════════════════════════════════════════
   PERSISTENT HEADER
═══════════════════════════════════════════ */
const Header = ({ tab, setTab }) => (
  <header className="sticky top-0 z-50 border-b" style={{ background: C.darkblue, borderColor: '#0d1e4a' }}>
    <div className="max-w-screen-xl mx-auto px-8 flex items-center justify-between" style={{ height: '60px' }}>
      <div className="flex items-center gap-4">
        <span className="text-white font-bold text-lg" style={{ letterSpacing: '-0.5px' }}>ecoplanet</span>
        <div className="w-px h-5 bg-white opacity-20"/>
        <span className="text-sm font-medium" style={{ color: 'rgba(255,255,255,0.75)' }}>{COMPANY.name}</span>
      </div>
      <div className="flex items-center gap-2">
        <Chip label="Strom"         value={COMPANY.stromMWh.toLocaleString('de-DE')} unit="MWh/a"/>
        <Chip label="Gas"           value={COMPANY.gasMWh.toLocaleString('de-DE')}  unit="MWh/a"/>
        <Chip label="Markt Strom"   value={COMPANY.stromMarket} unit="ct/kWh"/>
        <Chip label="Markt Gas"     value={COMPANY.gasMarket}   unit="ct/kWh"/>
        <Chip label="Standorte"     value={COMPANY.sites.toLocaleString('de-DE')} unit=""/>
      </div>
    </div>
    <div className="max-w-screen-xl mx-auto px-8 flex gap-1">
      {['Strategie', 'Portfoliomanagement'].map(t => (
        <button key={t} onClick={() => setTab(t)}
          className="px-6 py-2.5 text-sm font-semibold rounded-t-lg transition-all"
          style={{ background: tab===t ? C.bg : 'transparent', color: tab===t ? C.darkblue : 'rgba(255,255,255,0.55)', borderBottom: tab===t ? `2px solid ${C.bg}` : '2px solid transparent' }}>
          {t}
        </button>
      ))}
    </div>
  </header>
);

/* ═══════════════════════════════════════════
   STRATEGIE TAB — interactive Lastgang
═══════════════════════════════════════════ */
const PRODUCTS = [
  { key:'base',  label:'Base',     color:C.darkblue, fillColor:'#1a3a8a', desc:'Durchgängiges Grundlastband (24/7)', max:BASE_MAX },
  { key:'peak',  label:'Peak',     color:C.blue,     fillColor:C.blue,    desc:'Wochentage Mo–Fr, 07:00–17:00 Uhr', max:PEAK_MAX },
  { key:'wind',  label:'Wind PPA', color:'#0D9488',  fillColor:'#0D9488', desc:'Variables Windstromprofil (24/7)', max:WIND_MAX },
  { key:'pv',    label:'PV-PPA',   color:'#16A34A',  fillColor:'#16A34A', desc:'Tägliches Sonnenstrahlungsprofil', max:PV_MAX   },
];

const StrategieTab = () => {
  const [sliders, setSliders] = useState({ base:60, peak:65, wind:40, pv:30 });

  /* SVG layout constants */
  const W=900, H=280, PL=46, PB=32, PT=14, PR=10;
  const CW = W-PL-PR, CH = H-PT-PB;
  const YMAX = 1450;
  const xp = i  => PL + (i / (LOAD.length - 1)) * CW;
  const yp = v  => PT + CH - (v / YMAX) * CH;
  const yBottom = PT + CH;

  /* Compute stacks */
  const stacks = useMemo(() => {
    const sf = { base:sliders.base/100, peak:sliders.peak/100, wind:sliders.wind/100, pv:sliders.pv/100 };
    return LOAD.map((load, i) => {
      const s1 = Math.min(sf.base * BASE_MAX * PROFILES.base[i], load);
      const s2 = Math.min(s1 + sf.peak * PEAK_MAX * PROFILES.peak[i], load);
      const s3 = Math.min(s2 + sf.wind * WIND_MAX * PROFILES.wind[i], load);
      const s4 = Math.min(s3 + sf.pv * PV_MAX * PROFILES.pv[i], load);
      return [0, s1, s2, s3, s4, load];
    });
  }, [sliders]);

  /* Build SVG area path between two value arrays */
  const areaPath = (top, bot) => {
    let d = `M${xp(0).toFixed(1)},${yp(top[0]).toFixed(1)}`;
    for (let i=1;i<top.length;i++) d += ` L${xp(i).toFixed(1)},${yp(top[i]).toFixed(1)}`;
    for (let i=top.length-1;i>=0;i--) d += ` L${xp(i).toFixed(1)},${yp(bot[i]).toFixed(1)}`;
    return d + ' Z';
  };

  /* Load curve polyline */
  const loadLine = LOAD.map((v,i) => `${i===0?'M':'L'}${xp(i).toFixed(1)},${yp(v).toFixed(1)}`).join(' ');

  /* Day markers */
  const DAY_LABELS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  const dayX = d => xp(d * 24);
  const dayMidX = d => xp(d * 24 + 12);

  /* Y gridlines */
  const Y_GRID = [0, 350, 700, 1050, 1400];

  /* Coverage stats */
  const coverage = useMemo(() => {
    const totLoad = LOAD.reduce((a,b) => a+b, 0);
    const sf = { base:sliders.base/100, peak:sliders.peak/100, wind:sliders.wind/100, pv:sliders.pv/100 };
    const keys = ['base','peak','wind','pv'];
    const profs = [PROFILES.base, PROFILES.peak, PROFILES.wind, PROFILES.pv];
    const maxes = [BASE_MAX, PEAK_MAX, WIND_MAX, PV_MAX];
    return keys.map((k,idx) => {
      const total = LOAD.reduce((acc, load, i) => acc + Math.min(sf[k] * maxes[idx] * profs[idx][i], load), 0);
      return (total / totLoad * 100).toFixed(1);
    });
  }, [sliders]);

  const setSlider = (key, val) => setSliders(p => ({ ...p, [key]: Number(val) }));

  return (
    <div className="max-w-screen-xl mx-auto px-8 py-5 flex flex-col gap-5">

      {/* Chart card */}
      <div className="bg-white rounded-2xl border" style={{ borderColor: C.lgray }}>
        <div className="px-6 pt-5 pb-2 flex items-start justify-between">
          <div>
            <div className="text-xs font-medium" style={{ color: C.dgray }}>Netzbezug (Hauptwerk)</div>
            <div className="text-xs mt-0.5" style={{ color: '#9CA3AF' }}>kW · Durchschnittliche Woche</div>
          </div>
          <div className="flex items-center gap-5">
            {PRODUCTS.map(p => (
              <div key={p.key} className="flex items-center gap-1.5 text-xs" style={{ color: C.dgray }}>
                <div className="w-3 h-3 rounded-sm" style={{ background: p.fillColor, opacity: 0.8 }}/>
                {p.label}
              </div>
            ))}
            <div className="flex items-center gap-1.5 text-xs" style={{ color: '#9CA3AF' }}>
              <div className="w-3 h-3 rounded-sm bg-gray-200"/>
              Ungedeckt
            </div>
          </div>
        </div>

        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ display:'block' }}>
          {/* Horizontal grid lines */}
          {Y_GRID.map(v => (
            <g key={v}>
              <line x1={PL} y1={yp(v)} x2={W-PR} y2={yp(v)} stroke="#F3F4F6" strokeWidth="1"/>
              <text x={PL-5} y={yp(v)+3.5} textAnchor="end" fontSize="9" fill="#9CA3AF">{v}</text>
            </g>
          ))}

          {/* Vertical day separators */}
          {[1,2,3,4,5,6].map(d => (
            <line key={d} x1={dayX(d)} y1={PT} x2={dayX(d)} y2={yBottom} stroke="#E5E7EB" strokeWidth="0.8"/>
          ))}

          {/* Stacked product fills */}
          {/* Unhedged */}
          <path d={areaPath(stacks.map(s=>s[5]), stacks.map(s=>s[4]))} fill="#E5E7EB" opacity="0.75"/>
          {/* PV */}
          <path d={areaPath(stacks.map(s=>s[4]), stacks.map(s=>s[3]))} fill="#16A34A" opacity="0.65"/>
          {/* Wind */}
          <path d={areaPath(stacks.map(s=>s[3]), stacks.map(s=>s[2]))} fill="#0D9488" opacity="0.65"/>
          {/* Peak */}
          <path d={areaPath(stacks.map(s=>s[2]), stacks.map(s=>s[1]))} fill={C.blue} opacity="0.65"/>
          {/* Base */}
          <path d={areaPath(stacks.map(s=>s[1]), stacks.map(s=>s[0]))} fill={C.darkblue} opacity="0.75"/>

          {/* Load profile line — drawn on top */}
          <path d={loadLine} fill="none" stroke={C.darkblue} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>

          {/* Day labels */}
          {DAY_LABELS.map((label, d) => (
            <text key={d} x={dayMidX(d)} y={H-6} textAnchor="middle" fontSize="9.5" fill={C.dgray}>{label}</text>
          ))}

          {/* X-axis baseline */}
          <line x1={PL} y1={yBottom} x2={W-PR} y2={yBottom} stroke="#E5E7EB" strokeWidth="1"/>
        </svg>
      </div>

      {/* Sliders + Stats */}
      <div className="grid grid-cols-2 gap-5">

        {/* Sliders card */}
        <div className="bg-white rounded-2xl border p-6" style={{ borderColor: C.lgray }}>
          <div className="mb-5">
            <h3 className="font-bold text-base" style={{ color: C.darkblue }}>Beschaffungsprodukte strukturieren</h3>
            <p className="text-xs mt-0.5" style={{ color: C.dgray }}>Anteil der Produkte im Lastgang anpassen — Visualisierung aktualisiert sich live</p>
          </div>
          <div className="flex flex-col gap-5">
            {PRODUCTS.map((p,idx) => (
              <div key={p.key}>
                <div className="flex justify-between items-center mb-1.5">
                  <div className="flex items-center gap-2">
                    <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{ background: p.fillColor }}/>
                    <span className="text-sm font-bold" style={{ color: C.darkblue }}>{p.label}</span>
                    <span className="text-xs" style={{ color: C.dgray }}>{p.desc}</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-xs font-medium" style={{ color: C.dgray }}>
                      {Math.round(sliders[p.key]/100 * p.max)} kW
                    </span>
                    <span className="text-sm font-bold w-10 text-right" style={{ color: p.color }}>{sliders[p.key]}%</span>
                  </div>
                </div>
                <input type="range" min="0" max="100" value={sliders[p.key]}
                  onChange={e => setSlider(p.key, e.target.value)}
                  className="w-full"
                  style={{ background:`linear-gradient(to right,${p.fillColor} ${sliders[p.key]}%,#E5E7EB ${sliders[p.key]}%)`, accentColor:p.fillColor }}/>
                <div className="flex justify-between mt-0.5 text-xs" style={{ color:'#9CA3AF' }}>
                  <span>0%</span>
                  <span style={{ color:p.color, fontWeight:600 }}>{coverage[idx]}% des Lastgangs gedeckt</span>
                  <span>100%</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Coverage stats card */}
        <div className="flex flex-col gap-4">

          {/* Product breakdown */}
          <div className="bg-white rounded-2xl border p-5 flex-1" style={{ borderColor: C.lgray }}>
            <div className="font-bold text-sm mb-4" style={{ color: C.darkblue }}>Abdeckung im Lastgang</div>
            {PRODUCTS.map((p, idx) => (
              <div key={p.key} className="flex items-center gap-3 mb-3 last:mb-0">
                <div className="w-2.5 h-2.5 rounded-sm flex-shrink-0" style={{ background: p.fillColor }}/>
                <span className="text-sm flex-1" style={{ color:'#374151' }}>{p.label}</span>
                <div className="flex-1 h-2 rounded-full overflow-hidden bg-gray-100">
                  <div className="h-full rounded-full transition-all duration-500"
                    style={{ width:`${coverage[idx]}%`, background: p.fillColor, opacity:0.8 }}/>
                </div>
                <span className="text-sm font-bold w-12 text-right" style={{ color: p.color }}>{coverage[idx]}%</span>
              </div>
            ))}
            {/* Unhedged */}
            <div className="flex items-center gap-3 mt-3 pt-3 border-t" style={{ borderColor:'#F3F4F6' }}>
              <div className="w-2.5 h-2.5 rounded-sm flex-shrink-0 bg-gray-300"/>
              <span className="text-sm flex-1" style={{ color: C.dgray }}>Ungedeckt (Spot)</span>
              <div className="flex-1 h-2 rounded-full overflow-hidden bg-gray-100">
                <div className="h-full rounded-full transition-all duration-500 bg-gray-300"
                  style={{ width:`${Math.max(0, 100 - coverage.reduce((a,b)=>a+parseFloat(b),0)).toFixed(1)}%` }}/>
              </div>
              <span className="text-sm font-bold w-12 text-right" style={{ color: C.dgray }}>
                {Math.max(0, 100 - coverage.reduce((a,b)=>a+parseFloat(b),0)).toFixed(1)}%
              </span>
            </div>
          </div>

          {/* Product characteristics */}
          <div className="bg-white rounded-2xl border p-5" style={{ borderColor: C.lgray }}>
            <div className="font-bold text-sm mb-3" style={{ color: C.darkblue }}>Produkteigenschaften</div>
            <div className="grid grid-cols-2 gap-3">
              {[
                { label:'Base', tag:'24/7 Konstant', note:'Flat band, kein Profil-risiko', color:C.darkblue },
                { label:'Peak', tag:'Mo–Fr 7–17 Uhr', note:'Höchste Lastzeiten abdecken', color:C.blue },
                { label:'Wind PPA', tag:'Variable 24/7', note:'Nacht & Winterstunden stark', color:'#0D9488' },
                { label:'PV-PPA',   tag:'Taglicht', note:'Mittag-Peak, saisonale Stärke', color:'#16A34A' },
              ].map(c => (
                <div key={c.label} className="rounded-xl p-3" style={{ background:'#F9FAFB', border:`1.5px solid #F0F0F0` }}>
                  <div className="flex items-center gap-1.5 mb-1">
                    <div className="w-2 h-2 rounded-sm" style={{ background:c.color }}/>
                    <span className="text-xs font-bold" style={{ color:c.color }}>{c.label}</span>
                  </div>
                  <div className="text-xs font-semibold" style={{ color:C.darkblue }}>{c.tag}</div>
                  <div className="text-xs mt-0.5" style={{ color:C.dgray }}>{c.note}</div>
                </div>
              ))}
            </div>
          </div>

        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════
   PORTFOLIOMANAGEMENT TAB
═══════════════════════════════════════════ */
const PM_COMPS = [
  { key:'term',  label:'Terminmarkt', price:8.38, color:C.blue,    desc:'Fixe Jahreskontrakte an der EEX' },
  { key:'spot',  label:'Spotmarkt',   price:8.21, color:C.lblue,   desc:'Day-Ahead & Intraday Handel' },
  { key:'wind',  label:'Wind PPA',    price:7.64, color:'#0D9488', desc:'Langfristiger Windstromvertrag' },
  { key:'solar', label:'Solar PPA',   price:6.54, color:'#16A34A', desc:'Langfristiger Solarstromvertrag' },
];
const OPTIMAL = { term:40, spot:30, wind:21, solar:9 };
const MONTHLY_LOAD = [1180,1050,1080,980,920,850,830,860,960,1040,1120,1240];

const PortfolioTab = () => {
  const [mix, setMix] = useState({ term:40, spot:30, wind:20, solar:10 });
  const [animating, setAnimating] = useState(false);

  const sum = Object.values(mix).reduce((a,b)=>a+b,0);
  const blended = PM_COMPS.reduce((acc,c)=>acc+(mix[c.key]/Math.max(sum,1))*c.price,0);
  const savingsPct = ((COMPANY.stromMarket - blended)/COMPANY.stromMarket*100);
  const savingsEur = Math.round((COMPANY.stromMarket - blended)/100*COMPANY.stromMWh*1000);
  const normPct = key => sum > 0 ? (mix[key]/sum)*100 : 0;

  const applyOptimal = () => { setAnimating(true); setMix(OPTIMAL); setTimeout(()=>setAnimating(false),800); };
  const adjust = (k,v) => setMix(p=>({...p,[k]:Math.max(0,Math.min(100,Number(v)))}));

  return (
    <div className="max-w-screen-xl mx-auto px-8 py-6 flex flex-col gap-5">
      <div className="grid gap-5" style={{ gridTemplateColumns:'1fr 320px' }}>

        {/* Lastgang chart */}
        <div className="bg-white rounded-2xl border p-6" style={{ borderColor:C.lgray }}>
          <div className="flex justify-between items-center mb-4">
            <div>
              <h3 className="font-bold text-sm" style={{ color:C.darkblue }}>Lastgang & Produktstrukturierung</h3>
              <p className="text-xs mt-0.5" style={{ color:C.dgray }}>Monatlicher Verbrauch mit Produktmix</p>
            </div>
            <div className="flex gap-3">
              {PM_COMPS.map(c=>(
                <div key={c.key} className="flex items-center gap-1.5 text-xs" style={{ color:C.dgray }}>
                  <div className="w-2.5 h-2.5 rounded-sm" style={{ background:c.color }}/>
                  {c.label}
                </div>
              ))}
            </div>
          </div>
          <div className="flex items-end gap-2" style={{ height:'170px' }}>
            {MONTHLY_LOAD.map((load, mi) => (
              <div key={mi} className="flex-1 flex flex-col justify-end" style={{ height:'100%' }}>
                <div className="w-full rounded-t overflow-hidden flex flex-col-reverse"
                  style={{ height:`${(load/1320)*100}%`, transition:'height 0.4s ease' }}>
                  {PM_COMPS.map(c => {
                    const p = normPct(c.key);
                    return p > 0 ? <div key={c.key} style={{ height:`${p}%`, background:c.color, minHeight:'2px', transition:'height 0.4s ease' }}/> : null;
                  })}
                </div>
                <div className="text-center mt-1" style={{ fontSize:'9px', color:C.dgray }}>
                  {['J','F','M','A','M','J','J','A','S','O','N','D'][mi]}
                </div>
              </div>
            ))}
          </div>
          <div className="mt-3">
            <div className="text-xs font-semibold mb-1" style={{ color:C.darkblue }}>Aktuelle Produktverteilung</div>
            <div className="flex rounded-lg overflow-hidden h-7">
              {PM_COMPS.map(c => { const p=normPct(c.key); return p>0 ?
                <div key={c.key} className="flex items-center justify-center text-white font-bold transition-all duration-500"
                  style={{ flex:p, background:c.color, fontSize:p>10?'11px':'0px', minWidth:'2px' }}>
                  {p.toFixed(0)}%
                </div> : null;
              })}
            </div>
            {sum!==100 && <div className="mt-1.5 text-xs px-2 py-1 rounded-lg inline-block" style={{ background:'#FEF9C3', color:'#854D0E' }}>Summe: {sum}% — Balken zeigt normalisierte Verteilung</div>}
          </div>
        </div>

        {/* Result cards */}
        <div className="flex flex-col gap-4">
          <div className="rounded-2xl p-5 text-white" style={{ background:C.darkblue }}>
            <div className="text-xs opacity-55 mb-1">Optimierter Arbeitspreis</div>
            <div className="font-bold leading-none" style={{ fontSize:'2.6rem' }}>{blended.toFixed(2)}</div>
            <div className="text-sm opacity-65 mt-0.5">ct/kWh (gewichteter Ø)</div>
          </div>
          <div className={`rounded-2xl p-5 ${animating?'pulse-btn':''}`} style={{ background:C.yellow }}>
            <div className="text-xs font-semibold mb-0.5" style={{ color:C.darkblue }}>Einsparung vs. Marktpreis</div>
            <div className="font-bold leading-none" style={{ fontSize:'2.2rem', color:C.darkblue }}>-{savingsPct.toFixed(1)}%</div>
            <div className="text-sm font-bold mt-1" style={{ color:C.darkblue }}>≈ {savingsEur>0?savingsEur.toLocaleString('de-DE'):'0'} €/Jahr</div>
            <div className="text-xs mt-1 opacity-60" style={{ color:C.darkblue }}>Basis: {COMPANY.stromMarket} ct/kWh Markt</div>
          </div>
          <div className="rounded-2xl border p-4" style={{ borderColor:C.lgray, background:'white' }}>
            {PM_COMPS.map(c=>(
              <div key={c.key} className="flex items-center gap-2 py-1.5 border-b last:border-0" style={{ borderColor:'#F3F4F6' }}>
                <div className="w-2 h-2 rounded-sm flex-shrink-0" style={{ background:c.color }}/>
                <span className="text-xs flex-1" style={{ color:'#374151' }}>{c.label}</span>
                <span className="text-xs" style={{ color:C.dgray }}>{normPct(c.key).toFixed(1)}%</span>
                <span className="text-xs font-semibold w-24 text-right" style={{ color:C.darkblue }}>
                  {normPct(c.key)>0?`${((normPct(c.key)/100)*c.price).toFixed(3)} ct/kWh`:'–'}
                </span>
              </div>
            ))}
            <div className="flex justify-between pt-2 border-t mt-1" style={{ borderColor:C.lgray }}>
              <span className="text-xs font-bold" style={{ color:C.darkblue }}>Gesamt</span>
              <span className="text-xs font-bold" style={{ color:C.blue }}>{blended.toFixed(3)} ct/kWh</span>
            </div>
          </div>
        </div>
      </div>

      {/* Sliders */}
      <div className="bg-white rounded-2xl border p-6" style={{ borderColor:C.lgray }}>
        <div className="flex items-center justify-between mb-5">
          <div>
            <h3 className="font-bold text-base" style={{ color:C.darkblue }}>Produktmix konfigurieren</h3>
            <p className="text-xs mt-0.5" style={{ color:C.dgray }}>Anteile anpassen — Preis und Chart aktualisieren sich live</p>
          </div>
          <button onClick={applyOptimal}
            className="flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm active:scale-95 transition-transform"
            style={{ background:C.yellow, color:C.darkblue, boxShadow:'0 2px 12px rgba(226,236,43,.45)' }}>
            <svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 1l1.8 3.6 4 .6-2.9 2.8.7 4L8 10l-3.6 1.9.7-4L2.2 5.2l4-.6z" fill={C.darkblue}/></svg>
            Optimale Produktzusammensetzung
          </button>
        </div>
        <div className="grid grid-cols-2 gap-x-12 gap-y-5">
          {PM_COMPS.map(c=>(
            <div key={c.key}>
              <div className="flex justify-between items-center mb-1.5">
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{ background:c.color }}/>
                  <span className="text-sm font-bold" style={{ color:C.darkblue }}>{c.label}</span>
                  <span className="text-xs" style={{ color:C.dgray }}>{c.desc}</span>
                </div>
                <div className="flex items-center gap-3">
                  <span className="text-xs" style={{ color:C.dgray }}>{c.price} ct/kWh</span>
                  <span className="text-sm font-bold w-12 text-right" style={{ color:c.color }}>{mix[c.key]}%</span>
                </div>
              </div>
              <input type="range" min="0" max="100" value={mix[c.key]}
                onChange={e=>adjust(c.key,e.target.value)} className="w-full"
                style={{ background:`linear-gradient(to right,${c.color} ${mix[c.key]}%,#E5E7EB ${mix[c.key]}%)`, accentColor:c.color }}/>
              <div className="flex justify-between mt-0.5 text-xs" style={{ color:'#9CA3AF' }}>
                <span>Beitrag zum Preis</span>
                <span style={{ color:C.darkblue, fontWeight:600 }}>
                  {normPct(c.key).toFixed(1)}% × {c.price} = {((normPct(c.key)/100)*c.price).toFixed(3)} ct/kWh
                </span>
              </div>
            </div>
          ))}
        </div>
        <div className="mt-5 pt-4 border-t flex justify-between items-center" style={{ borderColor:'#F3F4F6' }}>
          <div className="text-xs font-bold" style={{ color:C.darkblue }}>Gewichteter Gesamtpreis</div>
          <div>
            <span className="font-bold" style={{ color:C.blue, fontSize:'1.05rem' }}>{blended.toFixed(3)} ct/kWh</span>
            <span className="text-xs ml-3" style={{ color:'#16A34A', fontWeight:700 }}>
              -{(COMPANY.stromMarket-blended).toFixed(3)} ct/kWh ({savingsPct.toFixed(1)}%)
            </span>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('Strategie');
  return (
    <div className="min-h-screen" style={{ background:C.bg }}>
      <Header tab={tab} setTab={setTab}/>
      {tab==='Strategie' ? <StrategieTab/> : <PortfolioTab/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
