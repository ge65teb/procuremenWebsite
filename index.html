<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ecoplanet – Energiebeschaffung NORMA Group SE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #F5F6FA; margin: 0; }
    .clip-arrow { clip-path: polygon(0 0, calc(100% - 48px) 0, 100% 50%, calc(100% - 48px) 100%, 0 100%); }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 9999px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }

    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-yellow { 0%,100% { box-shadow: 0 0 0 0 rgba(226,236,43,0.5); } 50% { box-shadow: 0 0 0 8px rgba(226,236,43,0); } }
    .pulse-btn { animation: pulse-yellow 2s infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Design tokens ── */
const C = {
  blue:      '#1A2FEE',
  darkblue:  '#00095B',
  lightblue: '#7582F6',
  yellow:    '#E2EC2B',
  lgray:     '#AEAEAE',
  dgray:     '#737373',
  bg:        '#F5F6FA',
};

/* ── Company data (header constants) ── */
const COMPANY = {
  name:        'NORMA Group SE',
  stromMWh:    12547,
  gasMWh:      7000,
  stromMarket: 10.23,
  gasMarket:   3.50,
  sites:       2500,
};

/* ═══════════════════════════════════════════
   SHARED PRIMITIVES
═══════════════════════════════════════════ */
const Chip = ({ label, value, unit, color = C.darkblue, bg = '#EEF0FF' }) => (
  <div className="flex flex-col items-start px-4 py-2 rounded-xl" style={{ background: bg }}>
    <span className="text-xs font-medium" style={{ color: C.dgray }}>{label}</span>
    <span className="text-sm font-bold leading-tight" style={{ color }}>
      {value}<span className="text-xs font-normal ml-1" style={{ color: C.dgray }}>{unit}</span>
    </span>
  </div>
);

const Bullet = ({ children, color = C.blue }) => (
  <div className="flex items-start gap-2 text-sm leading-snug mb-2">
    <span className="mt-1.5 w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: color }}/>
    <span dangerouslySetInnerHTML={{ __html: children }}/>
  </div>
);

const KpiCard = ({ num, label, desc, small }) => (
  <div className="rounded-xl p-4 text-white" style={{ background: C.blue }}>
    <div className={`font-bold leading-none ${small ? 'text-3xl' : 'text-4xl'}`}>{num}</div>
    <div className="font-semibold text-xs mt-2">{label}</div>
    {desc && <div className="text-xs mt-1 opacity-75 leading-snug">{desc}</div>}
  </div>
);

/* ═══════════════════════════════════════════
   PERSISTENT HEADER
═══════════════════════════════════════════ */
const Header = ({ tab, setTab }) => (
  <header className="sticky top-0 z-50 border-b" style={{ background: C.darkblue, borderColor: '#0d1e4a' }}>
    {/* Top row */}
    <div className="max-w-screen-xl mx-auto px-8 flex items-center justify-between" style={{ height: '64px' }}>
      {/* Brand */}
      <div className="flex items-center gap-4">
        <span className="text-white font-bold text-xl tracking-tight" style={{ letterSpacing: '-0.5px' }}>ecoplanet</span>
        <div className="w-px h-6 bg-white opacity-20"/>
        <span className="text-white text-sm font-medium opacity-80">{COMPANY.name}</span>
      </div>

      {/* KPIs */}
      <div className="flex items-center gap-2">
        <Chip label="Strom Verbrauch"   value={COMPANY.stromMWh.toLocaleString('de-DE')} unit="MWh/a" bg="rgba(255,255,255,0.08)" color="white"/>
        <Chip label="Gas Verbrauch"     value={COMPANY.gasMWh.toLocaleString('de-DE')}  unit="MWh/a" bg="rgba(255,255,255,0.08)" color="white"/>
        <Chip label="Marktpreis Strom"  value={COMPANY.stromMarket} unit="ct/kWh" bg="rgba(255,255,255,0.08)" color="white"/>
        <Chip label="Marktpreis Gas"    value={COMPANY.gasMarket}   unit="ct/kWh" bg="rgba(255,255,255,0.08)" color="white"/>
        <Chip label="Standorte"         value={COMPANY.sites.toLocaleString('de-DE')} unit="" bg="rgba(255,255,255,0.08)" color="white"/>
      </div>
    </div>

    {/* Tab row */}
    <div className="max-w-screen-xl mx-auto px-8 flex gap-1 pb-0">
      {['Strategie', 'Portfoliomanagement'].map(t => (
        <button key={t} onClick={() => setTab(t)}
          className="px-6 py-2.5 text-sm font-semibold rounded-t-lg transition-all"
          style={{
            background: tab === t ? C.bg : 'transparent',
            color: tab === t ? C.darkblue : 'rgba(255,255,255,0.6)',
            borderBottom: tab === t ? `2px solid ${C.bg}` : '2px solid transparent',
          }}>
          {t}
        </button>
      ))}
    </div>
  </header>
);

/* ═══════════════════════════════════════════
   STRATEGIE TAB — slide deck
═══════════════════════════════════════════ */

/* Shared slide frame */
const Slide = ({ title, sub, children, badge, noEp }) => (
  <div className="w-full aspect-video border rounded-xl flex flex-col overflow-hidden bg-white slide-in"
    style={{ borderColor: C.lgray }}>
    {/* Fixed-height title area */}
    <div className="flex items-start justify-between gap-4 flex-shrink-0 px-10 pt-8" style={{ minHeight: '88px' }}>
      <div className="flex-1">
        {sub && <div className="text-xs font-medium mb-1" style={{ color: C.dgray }}>{sub}</div>}
        <h2 className="text-2xl font-semibold leading-tight" style={{ color: C.darkblue, maxWidth: '80%' }}>{title}</h2>
      </div>
      {!noEp && <div className="rounded px-2.5 py-1 text-xs font-bold text-white flex-shrink-0" style={{ background: C.blue }}>ep</div>}
    </div>
    {/* Content */}
    <div className="flex-1 flex flex-col px-10 pb-8 overflow-hidden">{children}</div>
  </div>
);

/* Navy slide */
const NavySlide = ({ children }) => (
  <div className="w-full aspect-video border rounded-xl relative overflow-hidden flex flex-col slide-in"
    style={{ background: C.darkblue, borderColor: '#0d1e4a' }}>
    {children}
  </div>
);

/* ── Individual slides ── */
const S1 = () => (
  <NavySlide>
    <div className="absolute top-8 right-10 text-white font-semibold text-sm opacity-90">ecoplanet</div>
    <div className="absolute left-12 top-1/2 -translate-y-1/2 font-thin select-none" style={{ fontSize: '10rem', color: 'rgba(255,255,255,0.1)', lineHeight: 1 }}>{`{`}</div>
    <div className="absolute right-12 top-1/2 -translate-y-1/2 font-thin select-none" style={{ fontSize: '10rem', color: 'rgba(255,255,255,0.1)', lineHeight: 1 }}>{`}`}</div>
    <div className="absolute" style={{ left: '160px', top: '50%', transform: 'translateY(-50%)' }}>
      <div className="text-white font-bold mb-4" style={{ fontSize: '3.5rem', letterSpacing: '-2px', lineHeight: 1 }}>ecoplanet</div>

    </div>
    <div className="absolute bottom-8 left-10 text-xs" style={{ color: 'rgba(255,255,255,0.4)' }}>München · 2026</div>
  </NavySlide>
);

const S2 = () => {
  const clients = ['DURotherm','aco','vosla','SCHMEES cast','Wuppermann','Alloheim','Azurit','Schoeller Allibert','Müller | Lila Logistik','SLG','burgbad','schattdecor','Leipfinger Bader'];
  return (
    <Slide title="Mit der Energiebeschaffung über ecoplanet sparen Unternehmen im Schnitt 13,9% ihrer Energiekosten">
      <div className="flex-1 grid grid-cols-2 gap-6">
        <div className="flex flex-col gap-3">
          {[{n:'14',l:'Ersparnis in % · 2025',light:true},{n:'12',l:'Durchschn. Verbrauch in GWh'},{n:'100+',l:'Jährliche Ersparnis in k€'}].map(s=>(
            <div key={s.n} className="flex-1 rounded-xl p-4" style={{ background: s.light ? '#C5CEFF' : C.blue }}>
              <div className="font-bold" style={{ fontSize: '2.4rem', color: s.light ? C.darkblue : '#fff', lineHeight: 1 }}>{s.n}</div>
              <div className="text-xs mt-1.5" style={{ color: s.light ? C.darkblue : 'rgba(255,255,255,0.8)' }}>{s.l}</div>
            </div>
          ))}
        </div>
        <div>
          <div className="font-semibold text-sm mb-1" style={{ color: C.darkblue }}>In Summe verwalten wir &gt;5 TWh an 2.500 Standorten</div>

        </div>
      </div>
    </Slide>
  );
};

const S3 = () => (

        <div key={l} className="flex items-center justify-center text-center font-bold px-2 leading-tight" style={{ flex:f, background:bg, color:tc, fontSize:'10px' }}>{l}</div>
      ))}
    </div>
    <div className="flex mb-4">
      {[['großes Optimierungspotenzial über verbesserte Tranchenfixierungen, PPAs, etc.',5,C.blue],['Verbesserungspotenzial über verbesserte Konditionen',1.5,C.lightblue],['Steuern & Abgaben vorgegeben – Gebührenunterschiede minimal',3,'#9CA3AF']].map(([t,f,bc])=>(

      ))}
    </div>
    <div className="rounded-lg p-3 text-sm font-semibold text-white text-center mt-auto" style={{ background: C.darkblue }}>
      Die Verbesserung von Arbeitspreis und Versorgergebühren lohnt sich insbesondere bei gebündelten Energiekosten.
    </div>

const S4 = () => {
  const steps = [
    { title:'Lastganganalyse', bullets:['Auswertung der <strong>historischen Verbrauchsdaten</strong>','Modellierung <strong>individueller Anforderungen</strong>'],
      chart: <svg viewBox="0 0 120 60" className="w-full h-full">{[30,45,60,75,90,100,85,70,55,65,80,60,40].map((h,i)=><rect key={i} x={i*9} y={60-h*0.6} width={7} height={h*0.6} rx={1} fill="rgba(255,255,255,0.85)"/>)}</svg> },
    { title:'Strategieentwicklung', bullets:['<strong>Kostenoptimierung</strong> bei Minimierung des Spotanteils','Entwicklung Ihrer <strong>idealen Produktkombination</strong>'],
      chart: <svg viewBox="0 0 120 60" className="w-full h-full">{[85,70,90,55,80,65,75,85,60,75,80,70,65].map((h,i)=><rect key={i} x={i*9} y={60-h*0.6} width={7} height={h*0.6} rx={1} fill="rgba(255,255,255,0.7)"/>)}</svg> },
    { title:'Portfoliomanagement', light:true, bullets:['Nutzung von mehreren <strong>Perioden zur Beschaffung</strong>','Ausspielung von Kaufsignalen anhand <strong>Bollinger-Bänder</strong>'],
      chart: <svg viewBox="0 0 120 60" className="w-full h-full"><polyline points="0,50 20,35 40,42 60,20 80,28 100,18 120,22" fill="none" stroke={C.blue} strokeWidth="2"/><polyline points="0,55 20,48 40,52 60,38 80,45 100,30 120,40" fill="none" stroke="#FF8C00" strokeWidth="1.5" strokeDasharray="3,2"/></svg> },
  ];
  return (
    <Slide title="Energiebeschaffung mit ecoplanet: In drei einfachen Schritten zur Kostenoptimierung">
      <div className="flex-1 grid grid-cols-3 gap-4">
        {steps.map(s => (
          <div key={s.title} className="rounded-xl overflow-hidden flex flex-col">
            <div className="py-2.5 px-4 text-center font-bold text-sm" style={{ background: s.light ? '#E8ECFF' : C.blue, color: s.light ? C.darkblue : '#fff' }}>{s.title}</div>
            <div className="flex-1 p-4" style={{ background: s.light ? '#E8ECFF' : C.blue }}>
              <div className="rounded-lg bg-white bg-opacity-90 h-20 mb-3 p-2 flex items-end gap-0.5 overflow-hidden">{s.chart}</div>
              {s.bullets.map((b,i) => <Bullet key={i} color={s.light ? C.darkblue : 'rgba(255,255,255,0.9)'}>{b}</Bullet>)}
            </div>
          </div>
        ))}
      </div>
    </Slide>
  );
};

const SavingsSlide = ({ title, sub, badge, vol, current, currentLbl, optimized, optimizedLbl, mix, note }) => (
  <Slide title={title} sub={sub}>
    <div className="flex-1 grid grid-cols-2 gap-8">

        <div className="rounded-xl p-4 mb-4" style={{ background: '#EEF1FF' }}>
          <div className="font-bold text-lg" style={{ color: C.blue }}>Einsparungen &nbsp;{badge}</div>
          <div className="text-xs mt-0.5" style={{ color: C.dgray }}>{vol}</div>
        </div>
        <div className="flex items-end gap-4" style={{ height:'140px' }}>
          <div className="flex flex-col items-center gap-1.5">
            <div className="w-14 rounded-t-lg flex items-start justify-center pt-2 text-white text-xs font-bold" style={{ background:'#9CA3AF', height:'130px' }}>{current}</div>
            <div className="text-xs text-center leading-tight" style={{ color:C.dgray, maxWidth:'70px' }}>{currentLbl}</div>

          <div className="text-2xl font-bold mb-14" style={{ color:C.darkblue }}>→</div>
          <div className="flex flex-col items-center gap-1.5">
            <div className="w-14 rounded-t-lg flex items-start justify-center pt-2 text-white text-xs font-bold" style={{ background:C.blue, height:'100px' }}>{optimized}</div>
            <div className="text-xs text-center font-bold leading-tight" style={{ color:C.blue, maxWidth:'70px' }}>{optimizedLbl}</div>
          </div>
        </div>
        <div className="text-xs mt-1" style={{ color:C.dgray }}>ct/kWh</div>
      </div>
      <div>
        <div className="font-bold text-sm mb-3" style={{ color:C.darkblue }}>So setzt sich Ihr optimierter Preis zusammen</div>
        <div className="flex flex-col gap-3">
          {mix.map(m => (
            <div key={m.l} className="flex items-center gap-3">
              <span className="text-sm font-bold w-9 flex-shrink-0" style={{ color:C.darkblue }}>{m.p}</span>
              <div className="flex-1 h-8 rounded-md overflow-hidden bg-gray-100">
                <div className="h-full rounded-md flex items-center pl-3 text-white text-xs font-bold" style={{ background:m.c, width:m.p }}>{m.l}</div>
              </div>
              <span className="text-xs font-bold w-20 text-right" style={{ color:C.darkblue }}>{m.v}</span>
            </div>
          ))}
        </div>
        {note && <div className="mt-3 inline-block border rounded px-3 py-1.5 text-xs font-bold" style={{ borderColor:C.blue, color:C.blue }}>{note}</div>}
      </div>
    </div>
  </Slide>
);

const S5 = () => <SavingsSlide title="Analyse Lastgang — Produktzusammensetzung für optimalen Arbeitspreis" badge="-20,33%" vol="260.978 € / 12.547 MWh" current="10,23" currentLbl="Marktpreis Strom Jan 2026" optimized="8,15" optimizedLbl="Optimierter Preis 2027" mix={[{l:'Terminmarkt',p:'40%',c:C.blue,v:'8,38 ct/kWh'},{l:'Spot',p:'30%',c:C.lightblue,v:'8,21 ct/kWh'},{l:'PPAs',p:'30%',c:'#22C55E',v:'7,80 ct/kWh'}]} note="+ Versorgeraufschlag 0,30 ct/kWh"/>;
const S6 = () => <SavingsSlide title="Ihre optimierten Kosten für Gas — Zusammensetzung basiert auf Lastganganalyse" badge="-19,7%" vol="48.300 € / 7.000 MWh" current="3,50" currentLbl="Marktpreis Gas Jan 2026" optimized="2,81" optimizedLbl="Optimierter Preis 2027" mix={[{l:'Terminmarkt',p:'80%',c:C.blue,v:'2,81 ct/kWh'},{l:'Spot',p:'20%',c:C.lightblue,v:'2,79 ct/kWh'}]} note="+ Versorgeraufschlag 0,24 ct/kWh"/>;

        <div className="rounded-xl border p-4 flex flex-col" style={{ borderColor:C.lgray }}>
          <div className="text-xs font-semibold italic mb-2" style={{ color:C.darkblue }}>Ihr Lastgang (Durchschnittliche Woche)</div>
          <div className="flex-1 rounded-lg overflow-hidden" style={{ background:'#F9FAFB' }}>
            <svg viewBox="0 0 280 100" className="w-full h-full" preserveAspectRatio="none">
              <rect x="0" y="55" width="280" height="45" fill="#0D9488" opacity="0.55"/>
              <path d="M0,90 Q70,78 140,82 Q210,86 280,80" fill={C.blue} opacity="0.45"/>
              <polyline points="0,50 25,42 50,47 75,32 100,38 125,28 150,34 175,25 200,38 225,30 250,44 280,36" fill="none" stroke={C.darkblue} strokeWidth="2"/>

        <div className="rounded-xl p-5 text-white flex flex-col" style={{ background:C.blue }}>
          <div className="font-bold text-sm mb-3">Unsere gewonnenen Einblicke</div>
          {rows.map(([l,v]) => (

    <div className="flex-1 grid grid-cols-2 gap-5">
      <div>
        <Bullet><strong>Reduktion von Markt-Timing Risiken</strong> durch Aufteilung der Mengen in mehrere Tranchen</Bullet>
        <Bullet><strong>Ermittlung optimaler Kaufzeitpunkte</strong> durch Stop-Loss / Take-Profit Modell (Bollinger-Bänder)</Bullet>

              <path d="M0,60 Q50,50 100,55 Q150,60 200,50" fill="none" stroke={C.blue} strokeWidth="1.5" strokeDasharray="4,2"/>
              <path d="M0,30 Q50,12 100,22 Q150,32 200,14" fill="none" stroke="#9CA3AF" strokeWidth="1" strokeDasharray="3,3"/>

        <div className="rounded-xl overflow-hidden p-4" style={{ background:'#F9FAFB', height:'180px' }}>

                  background:`linear-gradient(to right, ${c.color} ${mix[c.key]}%, #E5E7EB ${mix[c.key]}%)`,
                  accentColor: c.color,
                }}/>
              {/* Contribution line */}
              <div className="flex justify-between mt-1 text-xs" style={{ color:C.dgray }}>
                <span>Beitrag zum Preis</span>
                <span style={{ color:C.darkblue, fontWeight:600 }}>
                  {normPct(c.key).toFixed(1)}% × {c.price} = {((normPct(c.key)/100)*c.price).toFixed(3)} ct/kWh
                </span>
              </div>
            </div>
          ))}
        </div>

        {/* Breakdown table */}
        <div className="mt-6 pt-5 border-t" style={{ borderColor:'#F3F4F6' }}>
          <div className="flex justify-between items-center text-xs font-bold" style={{ color:C.darkblue }}>
            <span>Gewichteter Gesamtpreis</span>
            <span style={{ color:C.blue, fontSize:'1rem' }}>{blended.toFixed(3)} ct/kWh</span>
          </div>
          <div className="flex justify-between items-center text-xs mt-1" style={{ color:C.dgray }}>
            <span>Einsparung vs. Marktpreis ({COMPANY.stromMarket} ct/kWh)</span>
            <span style={{ color:'#16A34A', fontWeight:700 }}>-{(COMPANY.stromMarket - blended).toFixed(3)} ct/kWh ({savingsPct.toFixed(1)}%)</span>
          </div>
        </div>
      </div>

    </div>
  );
};

/* ═══════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('Strategie');
  return (
    <div className="min-h-screen" style={{ background:C.bg }}>
      <Header tab={tab} setTab={setTab}/>
      {tab === 'Strategie' ? <StrategieTab/> : <PortfolioTab/>}
    </div>
  );
}

const style = document.createElement('style');
style.textContent = `input[type=range]::-webkit-slider-thumb { background: currentColor; }`;
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
